<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <title>AgentClaw Browser Skill</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d1117;
      color: #e0e0e0;
      padding: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .logo {
      width: 28px; height: 28px;
      background: linear-gradient(135deg, #7c83fd, #00bcd4);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }
    h1 { font-size: 14px; font-weight: 700; color: #7c83fd; }
    .subtitle { font-size: 10px; color: #555; margin-top: 1px; }

    .status-card {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
      transition: background 0.3s;
    }
    .dot.connected    { background: #4caf50; box-shadow: 0 0 6px #4caf5066; }
    .dot.disconnected { background: #555; }
    .dot.connecting   { background: #ff9800; animation: pulse 1s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    .status-info { flex: 1; min-width: 0; }
    .status-label { font-size: 12px; font-weight: 600; }
    .status-url   { font-size: 10px; color: #555; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .btn-row { display: flex; gap: 8px; margin-bottom: 12px; }
    button {
      flex: 1;
      padding: 8px 10px;
      border: none; border-radius: 6px;
      font-size: 12px; font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    button:active { transform: scale(0.97); }
    .btn-primary { background: #7c83fd; color: white; }
    .btn-primary:hover { background: #6a71f0; }
    .btn-secondary { background: #21262d; color: #888; border: 1px solid #30363d; }
    .btn-secondary:hover { background: #2d333b; color: #ccc; }

    .section-title {
      font-size: 10px;
      font-weight: 700;
      color: #444;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 6px;
    }

    .commands {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-bottom: 12px;
    }
    .cmd-btn {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 6px;
      padding: 7px 8px;
      font-size: 11px;
      color: #aaa;
      cursor: pointer;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: border-color 0.2s, color 0.2s;
    }
    .cmd-btn:hover { border-color: #7c83fd; color: #e0e0e0; }
    .cmd-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .cmd-icon { font-size: 13px; }

    .log-title {
      font-size: 10px;
      font-weight: 700;
      color: #444;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 4px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .log-clear { cursor: pointer; color: #333; font-size: 10px; }
    .log-clear:hover { color: #888; }
    #log {
      background: #0a0d12;
      border: 1px solid #21262d;
      border-radius: 6px;
      padding: 8px;
      height: 80px;
      overflow-y: auto;
      font-size: 10px;
      font-family: 'SF Mono', 'Consolas', monospace;
      color: #555;
    }
    #log .entry { padding: 1px 0; }
    #log .entry.ok  { color: #4caf50; }
    #log .entry.err { color: #f44336; }
    #log .entry.inf { color: #00bcd4; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">🦾</div>
    <div>
      <h1>AgentClaw</h1>
      <div class="subtitle">Browser Skill Extension</div>
    </div>
  </div>

  <div class="status-card">
    <div class="dot disconnected" id="dot"></div>
    <div class="status-info">
      <div class="status-label" id="status-label">Nicht verbunden</div>
      <div class="status-url" id="status-url">ws://localhost:5050/api/chrome/ws</div>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn-primary"   id="btn-connect">Verbinden</button>
    <button class="btn-secondary" id="btn-disconnect">Trennen</button>
  </div>

  <div class="section-title">Schnellbefehle</div>
  <div class="commands">
    <button class="cmd-btn" id="cmd-screenshot" disabled>
      <span class="cmd-icon">📸</span> Screenshot
    </button>
    <button class="cmd-btn" id="cmd-content" disabled>
      <span class="cmd-icon">📄</span> Inhalt lesen
    </button>
    <button class="cmd-btn" id="cmd-url" disabled>
      <span class="cmd-icon">🔗</span> Aktuelle URL
    </button>
    <button class="cmd-btn" id="cmd-title" disabled>
      <span class="cmd-icon">📝</span> Seitentitel
    </button>
  </div>

  <div class="log-title">
    <span>Log</span>
    <span class="log-clear" id="log-clear">löschen</span>
  </div>
  <div id="log"></div>

  <script src="popup.js"></script>
</body>
</html>
