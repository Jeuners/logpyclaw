agents:

  - type: echo
    id: agent:echo
    name: Echo

  - type: llm
    id: agent:alice
    name: Alice
    model: "llama-3.3-70b-versatile"
    provider: groq
    soul: ""           # leer → i18n default
    faction: makers
    enabled: true
    temperature: 0.7
    max_tokens: 2048

  - type: martin
    model: "minimax/minimax-m3"  # OpenRouter (Slug mit "/") — MiniMax M3, 1M Kontext. Provider wird aus dem Slug abgeleitet; "llama-3.3-70b-versatile" o.ä. ohne "/" → Groq.
    temperature: 0.3   # niedrig → präzise Routing-Entscheidungen
    persona: |
      Du bist Martin, der persönliche Assistent des Nutzers. Du bist hilfsbereit,
      direkt und sprichst per Du auf Deutsch. Du hast ein semantisches
      Langzeit-Gedächtnis: relevante Erinnerungen über den Nutzer und seine
      Projekte (z. B. LogpyClaw) werden dir pro Nachricht eingeblendet — nutze
      sie, statt zu raten. Du verfügst über ein Team von Spezialisten, an die du
      konkrete Werkzeug-Aufgaben delegierst — Fragen über dich, Smalltalk und
      allgemeine Wissensfragen beantwortest du selbst, knapp und persönlich.
    qc:
      enabled: true
      min_score: 7
      max_retries: 2
      auditor_id: "agent:alice"  # Groq → schnelle QC (war agent:claude, lokal lahm)

  - type: skill
    skill_id: websearch
    enabled: true

  - type: skill
    skill_id: comfyui
    enabled: true
    config:
      endpoint: ""     # leer → COMFYUI_URL aus .env

  - type: skill
    skill_id: ltxvideo
    enabled: true
    config:
      endpoint: ""     # leer → COMFYUI_URL aus .env

  - type: skill
    skill_id: whatsapp
    enabled: true
    config:
      default_group: ""   # leer → WHATSAPP_DEFAULT_GROUP aus .env

  - type: llm
    id: agent:coder
    name: Coder
    model: "minimax/minimax-m3"   # OpenRouter — MiniMax M3 als Coder (war llama-3.3-70b/Groq)
    provider: openrouter
    soul: "Du bist ein Experten-Programmierer. Schreibe sauberen, effizienten Code. Erkläre kurz was du tust. Nutze Codeblöcke."
    faction: makers
    enabled: true
    temperature: 0.15
    max_tokens: 32768   # komplette Single-File-Spiele brauchen Platz — 4096 schnitt Builds ab
    reasoning_max_tokens: 4096   # M3 denkt sonst bei komplexen Specs das ganze Budget weg (0 Content)

  - type: llm
    id: agent:local
    name: Local
    model: "llama3.2:3b"
    provider: ollama
    ollama_url: "http://localhost:11434"
    soul: "Du bist ein hilfreicher Assistent. Antworte präzise und nutze Tool-Aufrufe wenn sinnvoll."
    faction: makers
    enabled: true
    temperature: 0.7
    max_tokens: 2048

  - type: llm
    id: agent:router
    name: Router
    model: "deepseek/deepseek-v4-flash"
    provider: openrouter
    soul: "Du bist ein hilfreicher Assistent. Antworte präzise und nutze Tool-Aufrufe wenn sinnvoll."
    faction: makers
    enabled: true
    temperature: 0.7
    max_tokens: 2048

  - type: skill
    skill_id: coding
    enabled: true

  - type: skill
    skill_id: gmail
    enabled: true

  - type: skill
    skill_id: browser
    enabled: true

  - type: skill
    skill_id: chrome_browser
    enabled: true

  - type: skill
    skill_id: deploy
    enabled: true

  - type: skill
    skill_id: urlfetch
    enabled: true

  - type: skill
    skill_id: file
    enabled: true

  - type: skill
    skill_id: memory
    enabled: true

  - type: skill
    skill_id: rss
    enabled: true

  - type: skill
    skill_id: linkedin
    enabled: true
    config:
      access_token: ""   # LINKEDIN_ACCESS_TOKEN
      client_id: ""      # LINKEDIN_CLIENT_ID
      client_secret: ""  # LINKEDIN_CLIENT_SECRET → für Token-Introspection (Member-URN auto)
      person_urn: ""     # LINKEDIN_PERSON_URN (alternativ: direkte numerische ID)

  - type: skill
    skill_id: telegram
    enabled: true
    config:
      token: ""     # TELEGRAM_BOT_TOKEN
      chat_id: ""   # TELEGRAM_CHAT_ID

  - type: skill
    skill_id: wikipedia
    enabled: true

  - type: skill
    skill_id: physorg
    enabled: true

  - type: skill
    skill_id: youtube
    enabled: true

  - type: skill
    skill_id: transcription
    enabled: true
    config:
      whisper_model: "${HOME}/whisper-models/ggml-large-v3-turbo.bin"   # lokales whisper.cpp ggml-Modell
      whisper_cli: "/opt/homebrew/bin/whisper-cli"                      # whisper.cpp CLI (brew)
      ollama_url: "http://localhost:11434"                             # nur Fallback

  - type: claude
    id: agent:claude
    name: Claude
    faction: makers
    enabled: true
    claude_bin: "${HOME}/.local/bin/claude"
    model: "claude-opus-4-8"
    goal: "Du bist ein Experten-Entwickler und kreativer Designer. Liefere ausschließlich vollständige, lauffähige, produktionsreife Ergebnisse. Kein Placeholder-Code, keine TODOs, keine halben Sachen. Qualitätsstandard: 10/10."
    timeout: 600   # 10min — reicht für komplette HTML-Builds (~1500+ Zeilen)

  - type: a2a_gateway
    default_recipient: agent:alice
