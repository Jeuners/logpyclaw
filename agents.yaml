agents:

  - type: echo
    id: agent:echo
    name: Echo

  - type: llm
    id: agent:alice
    name: Alice
    model: ""          # leer → OLLAMA_MODEL aus .env
    provider: ollama
    soul: ""           # leer → i18n default
    enabled: true

  - type: martin
    model: ""          # leer → OLLAMA_MODEL aus .env
    qc:
      enabled: true
      min_score: 7
      max_retries: 2
      auditor_id: ""

  - type: skill
    skill_id: websearch
    enabled: true

  - type: skill
    skill_id: comfyui
    enabled: true
    config:
      endpoint: ""     # leer → COMFYUI_URL aus .env

  - type: skill
    skill_id: whatsapp
    enabled: true

  - type: llm
    id: agent:coder
    name: Coder
    model: qwen2.5-coder:7b
    provider: ollama
    soul: "Du bist ein Experten-Programmierer. Schreibe sauberen, effizienten Code. Erkläre kurz was du tust. Nutze Codeblöcke."
    enabled: true

  - type: skill
    skill_id: coding
    enabled: true

  - type: skill
    skill_id: gmail
    enabled: true

  - type: skill
    skill_id: browser
    enabled: true

  - type: skill
    skill_id: urlfetch
    enabled: true

  - type: a2a_gateway
    default_recipient: agent:alice
