[pytest]
testpaths = tests
asyncio_mode = auto
pythonpath = .

# Verhindert versehentliche Tests gegen Produktions-data/
# (conftest.py setzt AGENTCLAW_DATA_DIR auf tmp)

markers =
    slow: Tests die externe Dienste brauchen (Ollama, Qdrant, ComfyUI)
    needs_ollama: Erfordert laufendes Ollama auf localhost:11434
    needs_qdrant: Erfordert laufendes Qdrant auf localhost:6333
    needs_comfyui: Erfordert laufendes ComfyUI

# Standard: schnelle Tests. Slow-Tests mit `-m slow` explizit ausführen.
addopts = -m "not slow" --tb=short -q
