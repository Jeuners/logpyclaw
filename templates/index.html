            <img id="imagePreview" style="max-height:80px;border-radius:6px;border:1px solid var(--b2)">
            <button onclick="clearImageAttachment()" style="background:transparent;border:none;color:var(--textdim);cursor:pointer;font-size:16px" title="Remove image">✕</button>
          </div>
        </div>
        <div class="input-row">
          <textarea class="input-box" id="mainInput" placeholder="Message ${esc(currentAgent.name)}…" rows="1"
            onkeydown="handleInputKey(event)"
            oninput="autoResizeTextarea(this)"></textarea>
          <button class="send-btn" id="voiceBtn" title="Click: Conversation mode · Hold: Push-to-Talk"
            onmousedown="voiceBtnDown(event)" onmouseup="voiceBtnUp(event)" onmouseleave="voiceBtnUp(event)"
            ontouchstart="voiceBtnDown(event)" ontouchend="voiceBtnUp(event)">🎤</button>
          <button class="send-btn" id="sendBtn" onclick="sendMessage()">↑</button>
        </div>
        <div class="input-toolbar">
          <div class="voice-indicator" id="voiceIndicator">
            <div class="voice-dot"></div> Listening…
          </div>
          <button class="tool-btn" onclick="document.getElementById('imageFileInput').click()" title="Upload image">🖼 Image</button>
          <button class="tool-btn" id="editModeBtn" onclick="toggleEditMode()" title="Edit image">✏️ Edit</button>
          <input type="file" id="imageFileInput" accept="image/*" style="display:none" onchange="handleImageUpload(event)">
          <div id="skillBtns" style="display:contents"></div>
        </div>
      </div>
    </div>`;

  renderMessages();
  renderSkillBtns();
}

function renderNoAgent(ws) {
  ws.innerHTML = `
    <div class="no-agent">
      <div class="big-icon">🤠🤖</div>
      <p>Select or create an agent to start chatting</p>
      <button class="btn-primary" onclick="openNewAgentModal()" style="margin-top:8px">➕ New Agent</button>
    </div>`;
}

function renderMessages() {
  const el = document.getElementById('chatMessages');
  if (!el || !currentAgent) return;
  const msgs = conversations[currentAgent.id] || [];
  el.innerHTML = msgs.map((m, i) => renderMsg(m, i)).join('');
  scrollToBottom(el);
}

function renderMsg(m, index) {
  let content = m.content;
  if (m.role === 'assistant') {
    try { content = DOMPurify.sanitize(marked.parse(content)); } catch(e) {}
  } else {
    content = `<p>${esc(content).replace(/\n/g,'<br>')}</p>`;
  }
  const ts = m.ts ? `<span class="msg-meta">${new Date(m.ts).toLocaleTimeString()}</span>` : '';
  if (m.role === 'assistant') {
    const idx = index !== undefined ? index : (conversations[currentAgent?.id]?.length - 1);
    const imgHtml = m.task_image || m.image
      ? `<img src="${m.task_image || m.image}" style="max-width:100%;border-radius:8px;display:block;margin-top:8px">`
      : '';
    const promptHtml = m.task_prompt
      ? `<div style="font-size:10px;color:var(--textdim);margin-top:4px;font-family:var(--mono)">🎨 ${esc(m.task_prompt)}</div>`
      : '';
    return `<div class="msg assistant" data-idx="${idx}">
      ${ts}
      <div class="msg-bubble">${content}${imgHtml}${promptHtml}</div>
      ${m.stats ? `<div style="font-size:10px;color:var(--textdim);font-family:var(--mono);padding:2px 4px">⚡${m.stats.tok_s} tok/s · ${m.stats.tokens} tkn · ${m.stats.total_s}s</div>` : ''}
      <div class="msg-actions">
        <button class="btn-play" id="playBtn-${idx}" onclick="togglePlayByIndex(${idx})">▶ Play</button>
        <button class="btn-dl" title="Download audio" onclick="downloadAudioByIndex(${idx})">⬇</button>
      </div>
    </div>`;
  }
  return `<div class="msg ${m.role}">
    ${m.role === 'assistant' ? ts : ''}
    <div class="msg-bubble">${content}</div>
    ${m.role === 'user' ? ts : ''}
  </div>`;
}

function appendMsg(role, content, stats, image = null) {
  if (!currentAgent) return -1;
  if (!conversations[currentAgent.id]) conversations[currentAgent.id] = [];
  const msg = { role, content, ts: Date.now() };
  if (stats) msg.stats = stats;
  if (image) msg.image = image;
  const index = conversations[currentAgent.id].length;
  conversations[currentAgent.id].push(msg);
  const el = document.getElementById('chatMessages');
  if (el) {
    const div = document.createElement('div');
    div.innerHTML = renderMsg(msg, index);
    el.appendChild(div.firstElementChild);
    scrollToBottom(el);
  }
  return index;
}

function appendSystemMsg(content) {
  const el = document.getElementById('chatMessages');
  if (!el) return;
  const div = document.createElement('div');
  div.className = 'msg system';
  div.innerHTML = `<div class="msg-bubble">${esc(content)}</div>`;
  el.appendChild(div);
  scrollToBottom(el);
}

// Toast Notifications
function showToast(message, type = 'info', duration = 3000) {
  const container = document.getElementById('toastContainer') || createToastContainer();
  const toast = document.createElement('div');
  toast.className = `toast toast-${type}`;
  toast.innerHTML = `
    <span class="toast-icon">${type === 'success' ? '✅' : type === 'error' ? '❌' : 'ℹ️'}</span>
    <span class="toast-message">${esc(message)}</span>
  `;
  container.appendChild(toast);
  setTimeout(() => toast.classList.add('show'), 10);
  setTimeout(() => {
    toast.classList.remove('show');
    setTimeout(() => toast.remove(), 300);
  }, duration);
}

function createToastContainer() {
  const div = document.createElement('div');
  div.id = 'toastContainer';
  div.style.cssText = 'position:fixed;top:60px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px';
  document.body.appendChild(div);
  return div;
}

function showThinkingIndicator() {
  const el = document.getElementById('chatMessages');
  if (!el) return;
  const bars = [2,4,6,5,3,6,4,5,3,4].map((h,i) =>
    `<div class="eeg-bar" style="animation-delay:${i*0.08}s"></div>`
  ).join('');
  const div = document.createElement('div');
  div.id = 'thinkIndicator';
  div.className = 'think-wrap';
  div.innerHTML = `<span class="think-brain">🧠</span><div class="think-eeg">${bars}</div>`;
  el.appendChild(div);
  scrollToBottom(el);
}

function removeThinkingIndicator() {
  document.getElementById('thinkIndicator')?.remove();
}

// ═══════════════════════════════════════════════════
// Send Message
// ═══════════════════════════════════════════════════
function _releaseSend() {
  isSending = false;
  document.getElementById('sendBtn')?.removeAttribute('disabled');
  document.getElementById('mainInput')?.focus();
}

async function sendMessage(overrideText) {
  if (isSending) return;
  const input = document.getElementById('mainInput');
  const text = overrideText || (input ? input.value.trim() : '');
  if (!text || !currentAgent) return;

  if (input && !overrideText) { input.value = ''; autoResizeTextarea(input); }
  isSending = true;
  document.getElementById('sendBtn')?.setAttribute('disabled', '');
  // Safety net: always release isSending, even on unexpected throws
  const _release = () => _releaseSend();

  const activeSkills = new Set(currentAgent.skills || []);
  let imageData = null;

  // ── @AgentName mention → delegate task ────────────────────────────────────
  const mentionMatch = text.match(/^@(\S+)\s+([\s\S]+)$/);
  if (mentionMatch) {
    const targetName = mentionMatch[1].replace(/[,;:.!?]+$/, '');
    const taskMessage = mentionMatch[2].trim();
    const targetAgent = agents.find(a => a.name.toLowerCase() === targetName.toLowerCase());
    if (!targetAgent) {
      appendSystemMsg(`Unknown agent: @${esc(targetName)} — available: ${agents.map(a => '@'+a.name).join(', ')}`);
    } else {
      if (input && !overrideText) input.value = '';
      // Release send lock immediately — polling runs in background
      _release();
      handleAgentMention(targetAgent, taskMessage, text); // no await
      return;
    }
    _release();
    return;
  }

  // Screenshot skill: detect URL or domain/keyword, fetch screenshot, show in chat
  if (activeSkills.has('screenshot')) {
    // Match full URLs, bare domains (web.de), or "screenshot von X" pattern
    let rawUrl = null;
    const fullUrl = text.match(/https?:\/\/[^\s]+/);
    const screenshotOf = text.match(/screenshot\s+(?:von\s+|of\s+)?([^\s]+)/i);
    const bareDomain = text.match(/\b([a-z0-9-]+\.[a-z]{2,}(?:\.[a-z]{2,})?(?:\/[^\s]*)?)\b/i);
    if (fullUrl) rawUrl = fullUrl[0];
    else if (screenshotOf) rawUrl = screenshotOf[1];
    else if (bareDomain) rawUrl = bareDomain[1];
    if (rawUrl && !rawUrl.startsWith('http')) rawUrl = 'https://' + rawUrl;
    if (rawUrl) {
      appendMsg('user', text);
      appendSystemMsg(`📸 Taking screenshot of ${rawUrl}…`);
      try {
        const sc = await api('/api/screenshot', { method: 'POST', body: { url: rawUrl } });
        if (sc.image) {
          imageData = sc.image;
          // Show screenshot in chat
          const el = document.getElementById('chatMessages');
          if (el) {
            const div = document.createElement('div');
            div.className = 'msg assistant';
            div.innerHTML = `<div class="msg-bubble" style="padding:6px">
              <img src="${sc.image}" style="max-width:100%;border-radius:6px;display:block">
              <div style="font-size:10px;color:var(--textdim);margin-top:4px;font-family:var(--mono)">${esc(sc.url)}</div>
            </div>`;
            el.appendChild(div);
            scrollToBottom(el);
          }
        }
      } catch(e) {
        appendSystemMsg('Screenshot failed: ' + e.message);
      }
      showThinkingIndicator();
      try {
        const body = { agent_id: currentAgent.id, message: text };
        if (imageData) body.image_data = imageData;
        const data = await api('/api/chat', { method: 'POST', body });
        removeThinkingIndicator();
        const reply = data.reply || data.response || data.message || '';
        appendMsg('assistant', reply);
        if (autoPlay) togglePlay(idx, reply);
        dispatchReplyMentions(reply);
      } catch(e) {
        removeThinkingIndicator();
        appendSystemMsg('Error: ' + e.message);
      }
      _release();
      return;
    }
  }

  // Image generation skill
  if (activeSkills.has('image_gen')) {
    const IMG_TRIGGERS = /\b(generier\w*|mal\w*|zeichn\w*|illustrier\w*|generate|draw|paint|illustrate|bild|foto|image|picture|photo|wallpaper|artwork|illustration|zeichnung)\b/i;
    const isImgRequest = IMG_TRIGGERS.test(text);
    // Extract subject: everything after stripping known trigger words and filler
    let imgPrompt = null;
    if (isImgRequest) {
      imgPrompt = text
        .replace(/\b(bild|generier\w*|erstell\w*|zeich\w*|mal\w*|mach\w*|zeig\w*|mir\w*|ein\w*|eine\w*|eines\w*|von|eines?|einer?|generate|draw|create|make|paint|an?|image|picture|photo|of)\b/gi, ' ')
        .replace(/\s{2,}/g, ' ').trim();
    }
    if (imgPrompt && imgPrompt.length > 2) {
      appendMsg('user', text);
      // If prompt_optimize skill active and user asks to optimize, refine first
      const wantsOptimize = /\b(optimier\w*|optimize|verbessere|refine|verfeinere)\b/i.test(text);
      if (activeSkills.has('prompt_optimize') && wantsOptimize) {
        appendSystemMsg(`✨ Optimizing prompt…`);
        try {
          const optResult = await api('/api/prompt/optimize', {
            method: 'POST',
            body: { prompt: imgPrompt, framework: 'RTF', target_model: 'Image Generation' }
          });
          if (optResult.refinedPrompt) {
            imgPrompt = optResult.refinedPrompt;
            appendSystemMsg(`✨ Optimized: "${imgPrompt.slice(0, 90)}${imgPrompt.length > 90 ? '…' : ''}"`);
          }
        } catch(e) {
          appendSystemMsg('⚠️ Optimize failed, using original prompt.');
        }
      }
      appendSystemMsg(`🎨 Generating: "${imgPrompt.slice(0, 80)}${imgPrompt.length > 80 ? '…' : ''}"…`);
      try {
        const imgDataUrl = await comfyuiGenerate(imgPrompt);
        if (imgDataUrl) {
          imageData = imgDataUrl;
          const el = document.getElementById('chatMessages');
          if (el) {
            const div = document.createElement('div');
            div.className = 'msg assistant';
            div.innerHTML = `<div class="msg-bubble" style="padding:6px">
              <img src="${imgDataUrl}" style="max-width:100%;border-radius:8px;display:block">
              <div style="font-size:10px;color:var(--textdim);margin-top:4px;font-family:var(--mono)">🎨 ${esc(imgPrompt)}</div>
            </div>`;
            el.appendChild(div);
            scrollToBottom(el);
          }
        }
      } catch(e) {
        appendSystemMsg('Image generation failed: ' + e.message);
      }
      if (imageData) {
        showThinkingIndicator();
        try {
          const body = { agent_id: currentAgent.id, message: text, image_data: imageData };
          const data = await api('/api/chat', { method: 'POST', body });
          removeThinkingIndicator();
          const reply = data.reply || data.response || data.message || '';
          const msgIdx = appendMsg('assistant', reply, data.stats, data.image || null);
          if (autoPlay) togglePlay(msgIdx, reply);
          dispatchReplyMentions(reply);
        } catch(e) {
          removeThinkingIndicator();
          appendSystemMsg('Error: ' + e.message);
        }
      }
      _release();
      return;
    }
  }

  // Tagesschau news skill
  if (activeSkills.has('tagesschau')) {
    const NEWS_TRIGGERS = /\b(nachrichten|news|tagesschau|schlagzeilen|aktuell\w*|headlines?|meldungen|was.*passiert|was.*läuft|top\s*news)\b/i;
    if (NEWS_TRIGGERS.test(text)) {
      const CAT_MAP = [
        [/\bsport\w*\b/i, 'sport'],
        [/\bwirtschaft\w*|wirtschaft|finanzen|börse\b/i, 'wirtschaft'],
        [/\bausland\w*|international|welt\b/i, 'ausland'],
        [/\binland\w*|deutschland|deutsch\b/i, 'inland'],
        [/\bfakten\w*|fake\w*|faktencheck\b/i, 'faktenfinder'],
        [/\binvestigativ\w*|recherche\b/i, 'investigativ'],
      ];
      let category = 'top';
      for (const [rx, cat] of CAT_MAP) { if (rx.test(text)) { category = cat; break; } }
      appendMsg('user', text);
      appendSystemMsg(`📰 Loading Tagesschau news (${category})…`);
      let newsContext = '';
      try {
        const nd = await api(`/api/tagesschau?category=${category}&limit=10`);
        if (nd.items && nd.items.length) {
          newsContext = `Current Tagesschau news (${nd.category}, ${nd.date}):\n` +
            nd.items.map((it, i) => `${i+1}. **${it.title}**${it.description ? ' — ' + it.description : ''}${it.link ? ' ('+it.link+')' : ''}`).join('\n');
        }
      } catch(e) { newsContext = ''; }
      showThinkingIndicator();
      try {
        const body = { agent_id: currentAgent.id, message: text, system_extra: newsContext };
        const data = await api('/api/chat', { method: 'POST', body });
        removeThinkingIndicator();
        const reply = data.reply || data.response || data.message || '';
        const idx = appendMsg('assistant', reply, data.stats);
        if (autoPlay) togglePlay(idx, reply);
      } catch(e) {
        removeThinkingIndicator();
        appendSystemMsg('Error: ' + e.message);
      }
      return;
    }
  }

  // Hacker News skill
  if (activeSkills.has('hackernews')) {
    const HN_TRIGGERS = /\b(hacker\s*news|hn|tech\s*news|programming|silicon\s*valley|startup\s*news)\b/i;
    if (HN_TRIGGERS.test(text)) {
      appendMsg('user', text);
      appendSystemMsg(`🎩 Loading Hacker News…`);
      let newsContext = '';
      try {
        const nd = await api(`/api/hackernews?limit=15`);
        if (nd.items && nd.items.length) {
          newsContext = `Current Hacker News top stories:\n` +
            nd.items.map((it, i) => `${i+1}. **${it.title}** (${it.score} points by ${it.by}) — ${it.url}`).join('\n');
        }
      } catch(e) { newsContext = ''; }
      showThinkingIndicator();
      try {
        const body = { agent_id: currentAgent.id, message: text, system_extra: newsContext };
        const data = await api('/api/chat', { method: 'POST', body });
        removeThinkingIndicator();
        const reply = data.reply || data.response || data.message || '';
        const idx = appendMsg('assistant', reply, data.stats);
        if (autoPlay) togglePlay(idx, reply);
      } catch(e) {
        removeThinkingIndicator();
        appendSystemMsg('Error: ' + e.message);
      }
      return;
    }
  }
      _release();
      return;
    }
  }

  // Show image preview in chat if attached
  if (pendingImageData) {
    const el = document.getElementById('chatMessages');
    if (el) {
      const div = document.createElement('div');
      div.className = 'msg user';
      div.innerHTML = `<div class="msg-bubble" style="padding:6px">
        <img src="${pendingImageData}" style="max-width:260px;border-radius:6px;display:block;margin-bottom:4px">
        ${text ? `<span>${esc(text)}</span>` : ''}
      </div>`;
      el.appendChild(div);
      scrollToBottom(el);
    }
  } else {
    appendMsg('user', text);
  }

  showThinkingIndicator();

  try {
    const body = { agent_id: currentAgent.id, message: text };
    if (pendingImageData) body.image_data = pendingImageData;
    const data = await api('/api/chat', { method: 'POST', body });
    removeThinkingIndicator();
    const reply = data.reply || data.response || data.message || '';
    const idx = appendMsg('assistant', reply, data.stats);
    if (autoPlay) togglePlay(idx, reply);
    dispatchReplyMentions(reply);
  } catch (e) {
    removeThinkingIndicator();
    appendSystemMsg('Error: ' + e.message);
  }

  clearImageAttachment();
  _release();
}

function handleInputKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResizeTextarea(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 140) + 'px';
}

async function clearChat() {
  if (!currentAgent) return;
  if (!confirm('🗑️ Chat komplett löschen?\n\nKurzzeit-Speicher (Chat) UND Langzeit-Speicher (Vector Memory) werden gelöscht!')) return;
  
  conversations[currentAgent.id] = [];
  try { 
    await api(`/api/history/${currentAgent.id}`, { method: 'DELETE' }); 
    await api(`/api/memory/${currentAgent.id}`, { method: 'DELETE' });
    showToast('Chat & Memory gelöscht!', 'success');
  } catch(e) {
    showToast('Fehler: ' + e.message, 'error');
  }
  renderMessages();
}

// ═══════════════════════════════════════════════════
// Multi-Agent Broadcast
// ═══════════════════════════════════════════════════
function renderMultiShell(ws) {
  ws.innerHTML = `
    <div class="multi-shell">
      <div class="multi-topbar">
        <span class="multi-topbar-title">⚡ Broadcast</span>
        <span style="font-size:11px;color:var(--textdim);font-family:var(--mono)" id="multiStatus">Select agents →</span>
      </div>
      <div class="broadcast-area">
        <input class="broadcast-input" id="broadcastInput" placeholder="Send to all selected agents simultaneously…"
          onkeydown="if(event.key==='Enter')sendBroadcast()">
        <button class="broadcast-btn" id="broadcastBtn" onclick="sendBroadcast()">
          ⚡ Broadcast
        </button>
      </div>
      <div class="multi-grid" id="multiGrid"></div>
    </div>`;
  renderMultiCards();
}

function renderMultiCards() {
  const grid = document.getElementById('multiGrid');
  if (!grid) return;

  const statusEl = document.getElementById('multiStatus');
  if (statusEl) statusEl.textContent = selectedAgents.size + ' agent(s) selected';

  if (selectedAgents.size === 0) {
    grid.innerHTML = `<div style="grid-column:1/-1;color:var(--textdim);font-size:13px;font-family:var(--mono);padding:20px;text-align:center">
      Select agents in the panel to broadcast a message
    </div>`;
    return;
  }

  const arr = agents.filter(a => selectedAgents.has(a.id));
  grid.innerHTML = arr.map(a => `
    <div class="multi-card selected" id="mc_${a.id}" onclick="toggleMultiSelect('${a.id}')">
      <div class="multi-card-head">
        <div class="agent-avatar-wrap">${renderAgentAvatar(a,'sm')}</div>
        <span class="multi-card-name">${esc(a.name)}</span>
        <span class="multi-card-model">${esc((a.model||'').split('/').pop().slice(0,12))}</span>
      </div>
      <div class="multi-card-body">
        <span class="multi-card-empty">Waiting for broadcast…</span>
      </div>
    </div>`).join('');
}

async function sendBroadcast() {
  const text = document.getElementById('broadcastInput')?.value.trim();
  if (!text || selectedAgents.size === 0) return;

  const btn = document.getElementById('broadcastBtn');
  if (btn) btn.disabled = true;

  const arr = agents.filter(a => selectedAgents.has(a.id));

  // Show thinking on all cards
  arr.forEach(a => {
    const body = document.querySelector(`#mc_${a.id} .multi-card-body`);
    if (body) {
      const bars = [2,4,6,4,3].map((h,i) =>
        `<div class="eeg-bar" style="animation-delay:${i*0.1}s;height:${h*3}px"></div>`
      ).join('');
      body.innerHTML = `<div class="think-wrap" style="transform:scale(.82);transform-origin:left center">
        <span class="think-brain" style="font-size:16px">🧠</span>
        <div class="think-eeg">${bars}</div>
      </div>`;
    }
  });

  // Broadcast in parallel
  await Promise.all(arr.map(async agent => {
    try {
      const data = await api('/api/chat', {
        method: 'POST',
        body: { agent_id: agent.id, message: text }
      });
      const reply = data.reply || data.response || data.message || '';
      const body = document.querySelector(`#mc_${agent.id} .multi-card-body`);
      if (body) {
        let html = '';
        try { html = DOMPurify.sanitize(marked.parse(reply)); } catch(e) { html = esc(reply).replace(/\n/g,'<br>'); }
        body.innerHTML = `<div style="font-size:13px;line-height:1.6">${html}</div>`;
      }
      // Save to conversation
      if (!conversations[agent.id]) conversations[agent.id] = [];
      conversations[agent.id].push({ role: 'user', content: text, ts: Date.now() });
      conversations[agent.id].push({ role: 'assistant', content: reply, ts: Date.now() });
    } catch(e) {
      const body = document.querySelector(`#mc_${agent.id} .multi-card-body`);
      if (body) body.innerHTML = `<span style="color:var(--red);font-size:12px;font-family:var(--mono)">Error: ${esc(e.message)}</span>`;
    }
  }));

  if (btn) btn.disabled = false;
}

async function saveProviders() {
  // Backend expects a dict: { ollama: {api_key:…}, mistral: {api_key:…}, … }
  const updates = {};
  providers.forEach(p => {
    if (p.id === 'comfyui') {
      const url   = document.getElementById('comfyui_url')?.value.trim();
      const model = document.getElementById('comfyui_model')?.value;
      updates.comfyui = { url, model };
    } else if (p.id === 'telegram') {
      const bot_token = document.getElementById('telegram_bot_token')?.value.trim();
      const chat_id = document.getElementById('telegram_chat_id')?.value.trim();
      updates.telegram = { bot_token, chat_id };
    } else {
      const val = document.getElementById(`apikey_${p.id}`)?.value;
      if (val !== undefined) updates[p.id] = { api_key: val };
    }
  });
  try {
    await api('/api/providers', { method: 'POST', body: updates });
    await loadProviders();
    closeModal('providerModal');
  } catch(e) {
    alert('Save failed: ' + e.message);
  }
}

let allModels = { ollama: [], openrouter: [] };

async function loadModels() {
  try { allModels = await api('/api/models'); } catch(e) {}
}

function populateModelSelect(selectId, provider, currentModel) {
  const sel = document.getElementById(selectId);
  if (!sel) return;
  const models = provider === 'openrouter'
    ? allModels.openrouter || []
    : allModels.ollama || [];
  if (models.length === 0) {
    sel.innerHTML = currentModel
      ? `<option value="${esc(currentModel)}">${esc(currentModel)}</option>`
      : `<option value="">— keine Modelle gefunden —</option>`;
    return;
  }
  if (provider === 'openrouter') {
    const free = models.filter(m => m.free);
    const paid = models.filter(m => !m.free);
    const renderOpts = arr => arr.map(m =>
      `<option value="${esc(m.id)}"${m.id === currentModel ? ' selected' : ''}>${esc(m.name)}</option>`
    ).join('');
    sel.innerHTML =
      (free.length ? `<optgroup label="Free">${renderOpts(free)}</optgroup>` : '') +
      (paid.length ? `<optgroup label="Paid">${renderOpts(paid)}</optgroup>` : '');
    if (currentModel) sel.value = currentModel;
  } else {
    sel.innerHTML = models.map(m =>
      `<option value="${esc(m)}"${m === currentModel ? ' selected' : ''}>${esc(m)}</option>`
    ).join('');
  }
}

function populateProviderSelects() {
  ['newAgentProvider', 'editAgentProvider'].forEach(selId => {
    const sel = document.getElementById(selId);
    if (!sel) return;
    sel.innerHTML = providers.map(p => `<option value="${esc(p.id)}">${esc(p.name)}</option>`).join('');
  });
  populateVoiceSelects(); // async, runs in background
}

async function populateVoiceSelects() {
  let browserVoices = window.speechSynthesis ? window.speechSynthesis.getVoices() : [];
  
  // Fallback: Stimmen neu laden wenn leer
  if (!browserVoices.length) {
    await new Promise(resolve => {
      window.speechSynthesis.onvoiceschanged = () => {
        browserVoices = window.speechSynthesis.getVoices();
        resolve();
      };
      setTimeout(resolve, 1000);
    });
  }
  
  console.log('[Voices] All available:', browserVoices.map(v => `${v.name} (${v.lang})`));
  
  // Filter: Nur deutsche und englische Stimmen
  const deEnVoices = browserVoices.filter(v => v.lang.startsWith('de') || v.lang.startsWith('en'));
  
  console.log('[Voices] DE/EN filtered:', deEnVoices.map(v => v.name));
  
  // Gruppieren nach Sprache
  const deVoices = deEnVoices.filter(v => v.lang.startsWith('de'));
  const enVoices = deEnVoices.filter(v => v.lang.startsWith('en'));
  
  let macGroup = '';
  if (deVoices.length || enVoices.length) {
    const renderOpts = (vos, lang) => vos.map(v => 
      `<option value="mac:${esc(v.name)}">${esc(v.name)}</option>`
    ).join('');
    
    macGroup = '<optgroup label="Mac DE">' + renderOpts(deVoices, 'de') + '</optgroup>';
    macGroup += '<optgroup label="Mac EN">' + renderOpts(enVoices, 'en') + '</optgroup>';
  }

  // set placeholders first
  const voiceOptions = macGroup || '<option value="" disabled>Keine Mac-Stimmen gefunden</option>';
  ['newAgentVoice', 'editAgentVoice'].forEach(selId => {
    const sel = document.getElementById(selId);
    if (sel) sel.innerHTML = '<option value="">Off</option>' + voiceOptions;
  });

  let mistralGroup = '';
  try {
    const data = await api('/api/voices/mistral');
    const voices = (data.voices || []).filter(v => v.lang.startsWith('de') || v.lang.startsWith('en'));
    const byLang = {};
    voices.forEach(v => {
      const g = v.lang.startsWith('de') ? 'Mistral DE' : 'Mistral EN';
      if (!byLang[g]) byLang[g] = [];
      byLang[g].push(v);
    });
    mistralGroup = ['Mistral DE', 'Mistral EN'].filter(g => byLang[g]).map(g =>
      `<optgroup label="${g}">${byLang[g].map(v =>
        `<option value="${esc(v.slug)}">${esc(v.name)}</option>`
      ).join('')}</optgroup>`
    ).join('');
  } catch(e) {}

  ['newAgentVoice', 'editAgentVoice'].forEach(selId => {
    const sel = document.getElementById(selId);
    if (!sel) return;
    const current = sel.value;
    sel.innerHTML = '<option value="">Off</option>' + mistralGroup + macGroup;
    if (current) sel.value = current;
  });
}

async function openEditAgentModal(id) {
  const a = agents.find(x => x.id === id);
  if (!a) return;
  editingAgentId = id;
  _hasUnsavedChanges = false;
  
  document.getElementById('editAgentName').value = a.name || '';
  document.getElementById('editAgentRole').value = a.role || '';
  document.getElementById('editAgentSystem').value = a.soul || '';
  document.getElementById('editAgentMaxTokens').value = a.max_tokens || '';

  // Avatar & color
  _editAvatarB64 = a.avatar || '';
  const editColor = a.color || '#4f46e5';
  initColorSwatches('edit', editColor);
  const editPreview = document.getElementById('editAvatarPreview');
  if (editPreview) {
    if (_editAvatarB64) {
      editPreview.innerHTML = `<img src="${_editAvatarB64}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;border:2px solid ${editColor}">`;
    } else {
      editPreview.textContent = (a.name || '?')[0].toUpperCase();
      editPreview.style.background = editColor;
    }
  }
  await Promise.all([loadModels(), loadProviders()]);
  populateProviderSelects();
  const psel = document.getElementById('editAgentProvider');
  if (psel) { psel.value = a.provider || 'ollama'; }
  populateModelSelect('editAgentModel', a.provider || 'ollama', a.model || '');
  
  // Auto-save on field changes
  const addAutoSave = (elId, field, endpoint, transform) => {
    const el = document.getElementById(elId);
    if (!el) return;
    el.onchange = () => triggerAutoSave();
    el.onkeyup = () => triggerAutoSave();
  };
  
  addAutoSave('editAgentName', 'name', '/settings');
  addAutoSave('editAgentRole', 'role', '/settings');
  addAutoSave('editAgentSystem', 'soul', '/settings');
  addAutoSave('editAgentMaxTokens', 'max_tokens', '/settings');
  addAutoSave('editAgentProvider', 'provider', '/settings');
  addAutoSave('editAgentModel', 'model', '/settings');
  
  if (psel) psel.onchange = () => {
    populateModelSelect('editAgentModel', psel.value, '');
    triggerAutoSave();
  };
  
  // Voice auto-save
  const savedVoice = a.voice || '';
  populateVoiceSelects().then(() => {
    const vsel = document.getElementById('editAgentVoice');
    if (!vsel) return;
    vsel.value = savedVoice;
    if (savedVoice && !vsel.value && savedVoice !== 'voxtral') vsel.value = 'mac:' + savedVoice;
    vsel.onchange = async () => {
      const newVoice = vsel.value;
      await saveField(`/api/agents/${editingAgentId}/voice`, { voice: newVoice }, 'Stimme gespeichert');
      _hasUnsavedChanges = false;
    };
  });
  
  document.getElementById('editAgentDeleteBtn').onclick = () => deleteAgent(editingAgentId);
  
  // Skills with auto-save
  renderEditAgentSkills(a.skills || [], true);
  
  // Heartbeat
  const hb = a.heartbeat || {};
  const hbActive = !!hb.active;
  document.getElementById('editHeartbeatToggle').classList.toggle('on', hbActive);
  document.getElementById('editHeartbeatStatus').textContent = hbActive ? 'active' : 'inactive';
  document.getElementById('editHeartbeatFields').style.display = hbActive ? 'flex' : 'none';
  document.getElementById('editHeartbeatPrompt').value = hb.prompt || '';
  document.getElementById('editHeartbeatInterval').value = hb.interval_min || 30;
  
  // Heartbeat auto-save
  const saveHeartbeat = async () => {
    const hbActive = document.getElementById('editHeartbeatToggle').classList.contains('on');
    const hbPrompt = document.getElementById('editHeartbeatPrompt')?.value.trim();
    const hbInterval = parseInt(document.getElementById('editHeartbeatInterval')?.value) || 30;
    console.log('[Heartbeat] Saving for agent:', editingAgentId, {active: hbActive, prompt: hbPrompt});
    try {
      await api(`/api/agents/${editingAgentId}/heartbeat`, {
        method: 'PUT',
        body: { active: hbActive, prompt: hbPrompt, interval_min: hbInterval }
      });
      showToast('Heartbeat gespeichert!', 'success');
    } catch(e) {
      console.error('[Heartbeat] Error:', e);
      showToast('Fehler: ' + e.message, 'error');
    }
  };
  document.getElementById('editHeartbeatToggle').onclick = () => {
    const on = document.getElementById('editHeartbeatToggle').classList.toggle('on');
    document.getElementById('editHeartbeatStatus').textContent = on ? 'active' : 'inactive';
    document.getElementById('editHeartbeatFields').style.display = on ? 'flex' : 'none';
    saveHeartbeat();
  };
  document.getElementById('editHeartbeatPrompt').onkeyup = () => saveHeartbeat();
  document.getElementById('editHeartbeatInterval').onchange = () => saveHeartbeat();
  
  openModal('editAgentModal');
}

function renderEditAgentSkills(activeList, autoSave = false) {
  const el = document.getElementById('editAgentSkills');
  if (!el) return;
  const active = new Set(activeList);
  el.innerHTML = skills.map(s => {
    const on = active.has(s.id);
    const unavail = s.available === false ? ';opacity:.45' : '';
    const clickHandler = autoSave 
      ? `this.classList.toggle('active');saveSkillsOnChange();`
      : `this.classList.toggle('active')`;
    return `<button type="button" class="tool-btn${on ? ' active' : ''}" style="font-size:12px${unavail}"
      title="${esc(s.description)}"
      onclick="${clickHandler}"
      data-skill-id="${s.id}">${s.icon} ${esc(s.name)}</button>`;
  }).join('');
}

// Auto-save debounce timer
let _autoSaveTimer = null;
let _hasUnsavedChanges = false;

// Save functions for each field type
async function saveField(endpoint, data, successMsg) {
  try {
    const res = await api(endpoint, { method: 'PUT', body: data });
    if (res.ok) {
      await loadAgents();
      if (currentAgent?.id === editingAgentId) {
        currentAgent = agents.find(a => a.id === editingAgentId);
      }
      if (successMsg) showToast(successMsg, 'success');
      renderSidePanel();
    } else {
      showToast(res.error || 'Fehler beim Speichern', 'error');
    }
  } catch(e) {
    showToast('Fehler: ' + e.message, 'error');
  }
}

function triggerAutoSave() {
  _hasUnsavedChanges = true;
  clearTimeout(_autoSaveTimer);
  _autoSaveTimer = setTimeout(async () => {
    if (!_hasUnsavedChanges || !editingAgentId) return;
    _hasUnsavedChanges = false;
    
    // Save all fields
    const name = document.getElementById('editAgentName')?.value.trim();
    const provider = document.getElementById('editAgentProvider')?.value;
    const model = document.getElementById('editAgentModel')?.value.trim();
    const system = document.getElementById('editAgentSystem')?.value.trim();
    const role = document.getElementById('editAgentRole')?.value.trim();
    const maxTokens = parseInt(document.getElementById('editAgentMaxTokens')?.value) || null;
    
    const color = document.getElementById('editAgentColorCustom')?.value;
    await saveField(`/api/agents/${editingAgentId}/settings`,
      { name, role, provider, model, soul: system, max_tokens: maxTokens, color },
      'Einstellungen gespeichert'
    );
  }, 500);
}

async function saveEditAgent() {
  if (!editingAgentId) return;
  
  // Final save - save everything including skills and heartbeat
  const name = document.getElementById('editAgentName')?.value.trim();
  const provider = document.getElementById('editAgentProvider')?.value;
  const model = document.getElementById('editAgentModel')?.value.trim();
  const system = document.getElementById('editAgentSystem')?.value.trim();
  const role = document.getElementById('editAgentRole')?.value.trim();
  const maxTokens = parseInt(document.getElementById('editAgentMaxTokens')?.value) || null;
  const voice = document.getElementById('editAgentVoice')?.value;
  const skillEls = document.querySelectorAll('#editAgentSkills [data-skill-id]');
  const activeSkills = [...skillEls].filter(b => b.classList.contains('active')).map(b => b.dataset.skillId);
  const hbActive = document.getElementById('editHeartbeatToggle')?.classList.contains('on');
  const hbPrompt = document.getElementById('editHeartbeatPrompt')?.value.trim();
  const hbInterval = parseInt(document.getElementById('editHeartbeatInterval')?.value) || 30;

  try {
    // Save settings first
    const color = document.getElementById('editAgentColorCustom')?.value;
    await saveField(`/api/agents/${editingAgentId}/settings`,
      { name, role, provider, model, soul: system, max_tokens: maxTokens, color },
      null
    );
    
    // Save voice
    await saveField(`/api/agents/${editingAgentId}/voice`,
      { voice },
      null
    );
    
    // Save skills
    await saveField(`/api/agents/${editingAgentId}/skills`,
      { skills: activeSkills },
      null
    );
    
    // Save heartbeat
    await api(`/api/agents/${editingAgentId}/heartbeat`, {
      method: 'PUT',
      body: { active: hbActive, prompt: hbPrompt, interval_min: hbInterval }
    });
    
    await loadAgents();
    if (currentAgent?.id === editingAgentId) {
      currentAgent = agents.find(a => a.id === editingAgentId);
    }
    
    showToast('Alle Änderungen gespeichert!', 'success');
    closeModal('editAgentModal');
    renderSidePanel();
    if (currentView === 'chat') renderChatShell(document.getElementById('workspace'));
  } catch(e) {
    showToast('Fehler: ' + e.message, 'error');
  }
}

async function deleteAgent(id) {
  if (!confirm('Delete this agent?')) return;
  try {
    await api(`/api/agents/${id}`, { method: 'DELETE' });
    agents = agents.filter(a => a.id !== id);
    delete conversations[id];
    if (currentAgent?.id === id) { currentAgent = null; }
    closeModal('editAgentModal');
    renderSidePanel();
    if (currentView === 'chat') {
      if (currentAgent) renderChatShell(document.getElementById('workspace'));
      else renderNoAgent(document.getElementById('workspace'));
    }
  } catch(e) {
    alert('Delete failed: ' + e.message);

function openExportModal() { openModal('exportModal'); }

function exportAs(fmt) {
  if (!currentAgent) { alert('Select an agent first'); return; }
  const msgs = conversations[currentAgent.id] || [];
  let content = '', filename = `${currentAgent.name}-${Date.now()}`;

  if (fmt === 'json') {
    content = JSON.stringify({ agent: currentAgent, messages: msgs }, null, 2);
    filename += '.json';
  } else if (fmt === 'md') {
    content = `# ${currentAgent.name}\n\n` + msgs.map(m =>
      `**${m.role === 'user' ? 'You' : currentAgent.name}** *(${new Date(m.ts).toLocaleString()})*\n\n${m.content}\n\n---\n`
    ).join('');
    filename += '.md';
  } else {
    content = msgs.map(m => `[${m.role.toUpperCase()}] ${m.content}`).join('\n\n');
    filename += '.txt';
  }

  const blob = new Blob([content], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
  closeModal('exportModal');
}

async function startAutoDialog() {
  const idA = document.getElementById('autoAgentA')?.value;
  const idB = document.getElementById('autoAgentB')?.value;
  const opening = document.getElementById('autoDialogPrompt')?.value.trim();
  const turns = parseInt(document.getElementById('autoDialogTurns')?.value || '5');
  const agentA = agents.find(a => a.id === idA);
  const agentB = agents.find(a => a.id === idB);

  if (!agentA || !agentB || !opening) { alert('All fields required'); return; }
  if (idA === idB) { alert('Select two different agents'); return; }

  closeModal('autoDialogModal');
  selectAgent(idA);
  await new Promise(r => setTimeout(r, 100));

  const banner = document.getElementById('autoBanner');
  const bannerText = document.getElementById('autoBannerText');
  if (banner) banner.classList.add('active');
  autoDialogAbort = false;

  let msgA = opening;
  let currentTurns = 0;

  while (currentTurns < turns && !autoDialogAbort) {
    // A replies
    if (bannerText) bannerText.textContent = `Auto-dialog: ${agentA.name} thinking…`;
    const tmpAgent = currentAgent;
    currentAgent = agentA;
    appendMsg('user', msgA);
    showThinkingIndicator();
    let replyA = '';
    try {
      const d = await api('/api/chat', { method: 'POST', body: { agent_id: idA, message: msgA } });
      replyA = d.reply || d.response || d.message || '';
    } catch(e) { replyA = '[error]'; }
    removeThinkingIndicator();
    appendMsg('assistant', replyA);
    if (autoDialogAbort) break;

    await new Promise(r => setTimeout(r, 600));

    // B replies
    if (bannerText) bannerText.textContent = `Auto-dialog: ${agentB.name} thinking…`;
    currentAgent = agentB;
    appendMsg('user', replyA);
    showThinkingIndicator();
    let replyB = '';
    try {
      const d = await api('/api/chat', { method: 'POST', body: { agent_id: idB, message: replyA } });
      replyB = d.reply || d.response || d.message || '';
    } catch(e) { replyB = '[error]'; }
    removeThinkingIndicator();
    appendMsg('assistant', replyB);

    msgA = replyB;
    currentTurns++;
    if (autoDialogAbort) break;
    await new Promise(r => setTimeout(r, 600));
  }

  currentAgent = agentA;
  if (banner) banner.classList.remove('active');
  appendSystemMsg(`Auto-dialog ended after ${currentTurns} turns.`);
}

function cleanForTTS(text) {
  return text
    .replace(/\[.*?\]/gs, '')
    .replace(/https?:\/\/\S+/g, '')
    .replace(/\*\*(.*?)\*\*/g, '$1')
    .replace(/\*(.*?)\*/g, '$1')
    .replace(/#{1,6}\s/g, '')
    .replace(/`[^`]*`/g, '')
    .replace(/\s{2,}/g, ' ')
    .trim();
}

function splitSentences(text) {
  const raw = text.match(/[^.!?…\n]+[.!?…\n]+|[^.!?…\n]+$/g) || [text];
  const merged = [];
  let buf = '';
  for (const s of raw) {
    buf += (buf ? ' ' : '') + s.trim();
    if (buf.length >= 180) { merged.push(buf); buf = ''; }
  }
  if (buf.trim()) merged.push(buf.trim());
  return merged.filter(s => s.length > 0);
}

function _cancelSpeechSynthesis() {
  if (!window.speechSynthesis) return;
  // cancel() is unreliable — hammer it
  for (let i = 0; i < 3; i++) {
    try { window.speechSynthesis.cancel(); } catch(e) {}
  }
  setTimeout(() => { try { window.speechSynthesis.cancel(); } catch(e) {} }, 50);
  setTimeout(() => { try { window.speechSynthesis.cancel(); } catch(e) {} }, 150);
}

function stopCurrentAudio() {
  if (currentAudio) { try { currentAudio.pause(); currentAudio.currentTime = 0; } catch(e) {} currentAudio = null; }
  _cancelSpeechSynthesis();
  if (currentPlayingIndex >= 0) {
    const btn = document.getElementById(`playBtn-${currentPlayingIndex}`);
    if (btn) { btn.textContent = '▶ Play'; btn.classList.remove('playing'); }
    currentPlayingIndex = -1;
  }
  setTTSPlaying(false);
}

function globalStopAudio() {
  stopCurrentAudio();
  // Belt-and-suspenders: also nuke any dangling audio elements
  document.querySelectorAll('audio').forEach(a => { try { a.pause(); a.src = ''; } catch(e) {} });
  _cancelSpeechSynthesis();
}

function setTTSPlaying(on) {
  document.getElementById('speakingDot')?.classList.toggle('active', on);
  document.getElementById('ttsStopBtn')?.classList.toggle('active', on);
  const bar = document.getElementById('globalMuteBar');
  if (bar) bar.style.display = on ? 'flex' : 'none';
}

async function fetchAudioBlob(text, voice) {
  const resp = await fetch('/api/tts', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ text, voice })
  });
  if (!resp.ok) throw new Error('TTS error ' + resp.status);
  return await resp.blob();
}

function togglePlayByIndex(index) {
  const msgs = conversations[currentAgent?.id] || [];
  const msg = msgs[index];
  if (msg) togglePlay(index, msg.content);
}

async function togglePlay(index, text) {
  if (!currentAgent || !text) return;
  text = cleanForTTS(text);
  if (!text) return;
  const voice = currentAgent.voice || '';
  if (currentPlayingIndex === index) { stopCurrentAudio(); return; }
  stopCurrentAudio();
  currentPlayingIndex = index;
  const btn = document.getElementById(`playBtn-${index}`);
  if (btn) { btn.textContent = '⏳ Loading…'; btn.classList.add('playing'); }
  setTTSPlaying(true);
  if (voice.startsWith('mac:')) {
    await playMacVoiceAsync(text, voice.replace('mac:', ''), btn);
    if (currentPlayingIndex === index) stopCurrentAudio();
    return;
  }
  const sentences = splitSentences(text);
  const audioEl = new Audio();
  try {
    for (let i = 0; i < sentences.length; i++) {
      if (currentPlayingIndex !== index) break;
      let blob;
      try { blob = await fetchAudioBlob(sentences[i], voice || 'en_paul_neutral'); }
      catch(e) { continue; }
      if (currentPlayingIndex !== index) break;
      const url = URL.createObjectURL(blob);
      audioEl.src = url;
      audioEl.playbackRate = ttsSpeed;
      currentAudio = audioEl;
      if (btn) { btn.textContent = '⏹ Stop'; btn.classList.add('playing'); }
      await new Promise(resolve => { audioEl.onended = resolve; audioEl.onerror = resolve; audioEl.play().catch(resolve); });
      URL.revokeObjectURL(url);
      if (i < sentences.length - 1 && currentPlayingIndex === index)
        await new Promise(r => setTimeout(r, 150));
    }
  } catch(e) {}
  finally { if (currentPlayingIndex === index) stopCurrentAudio(); }
}

async function downloadAudioByIndex(index) {
  const msgs = conversations[currentAgent?.id] || [];
  const msg = msgs[index];
  if (!msg || !currentAgent) return;
  const text = cleanForTTS(msg.content);
  if (!text) return;
  let voice = currentAgent.voice || '';
  if (!voice || voice.startsWith('mac:')) {
    showToast('Download nur für Mistral-Stimmen verfügbar', 'error');
    return;
  }
  try {
    const blob = await fetchAudioBlob(text.slice(0, 500), voice);
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = `msg-${index}.mp3`; a.click();
    URL.revokeObjectURL(url);
  } catch(e) { alert('Download failed: ' + e.message); }
}

async function playMacVoiceAsync(text, voiceName, btn) {
  return new Promise(async resolve => {
    if (!window.speechSynthesis) { 
      showToast('Speech Synthesis nicht verfügbar', 'error');
      resolve(); 
      return; 
    }
    window.speechSynthesis.cancel();
    
    // Wait for voices if not loaded
    let voices = window.speechSynthesis.getVoices();
    if (!voices.length) {
      await new Promise(r => {
        window.speechSynthesis.onvoiceschanged = () => {
          voices = window.speechSynthesis.getVoices();
          r();
        };
        setTimeout(r, 1000);
      });
    }
    
    console.log('[Voice] Available voices:', voices.map(v => v.name));
    console.log('[Voice] Looking for:', voiceName);
    
    const utt = new SpeechSynthesisUtterance(text);
    const found = voices.find(v => v.name === voiceName || v.name.startsWith(voiceName));
    
    if (!found) {
      console.log('[Voice] Not found, trying default');
      // Try to find any German or English voice as fallback
      const fallback = voices.find(v => v.lang.startsWith('de') || v.lang.startsWith('en'));
      if (fallback) {
        utt.voice = fallback;
        showToast('Stimme nicht gefunden, verwende: ' + fallback.name, 'info');
      } else {
        showToast('Keine Stimme verfügbar', 'error');
        resolve();
        return;
      }
    } else {
      utt.voice = found;
    }
    
    utt.onstart = () => { if (btn) { btn.textContent = '⏹ Stop'; btn.classList.add('playing'); } };
    utt.onend = () => { if (btn) { btn.textContent = '▶ Play'; btn.classList.remove('playing'); } resolve(); };
    utt.onerror = (e) => { 
      console.log('[Voice] Error:', e);
      showToast('Fehler bei Sprachausgabe', 'error'); 
      resolve(); 
    };
    window.speechSynthesis.speak(utt);
  });
}

// ─── Agent-to-Agent Tasks ──────────────────────────────────────────────────────

function dispatchReplyMentions(reply) {
  // Scan an assistant reply for @AgentName mentions and auto-dispatch tasks
  if (!reply || !currentAgent) return;
  const rx = /@([A-Za-zÄÖÜäöüß][\w\s&]*?)(?=[,\s:!?.–—]|$)/g;
  let m;
  while ((m = rx.exec(reply)) !== null) {
    const rawName = m[1].trim().replace(/[,;:.!?]+$/, '');
    const target = agents.find(a => a.name.toLowerCase() === rawName.toLowerCase());
    if (!target || target.id === currentAgent.id) continue;
    // Extract task: everything after the @Name mention (strip leading punctuation/space)
    const afterMention = reply.slice(m.index + m[0].length).replace(/^[,\s–—:]+/, '').trim();
    const taskMsg = afterMention || reply;
    appendSystemMsg(`🤖 ${esc(currentAgent.name)} delegating to @${esc(target.name)}…`);
    handleAgentMention(target, taskMsg, `@${target.name} ${taskMsg}`);
    break; // one dispatch per reply to avoid spam
  }
}

async function handleAgentMention(targetAgent, message, rawText) {
  appendMsg('user', rawText);
  appendSystemMsg(`⏳ @${esc(targetAgent.name)} is working on it…`);

  let task;
  try {
    task = await api('/api/tasks', {
      method: 'POST',
      body: {
        sender_agent_id: currentAgent.id,
        sender_agent_name: currentAgent.name,
        recipient_agent_id: targetAgent.id,
        recipient_agent_name: targetAgent.name,
        message
      }
    });
  } catch(e) {
    appendSystemMsg(`Fehler: ${esc(e.message)}`);
    return;
  }

  // Poll with gentle back-off (1.5s → 4s)
  let delay = 1500;
  const MAX_POLLS = 60;
  for (let i = 0; i < MAX_POLLS; i++) {
    await new Promise(r => setTimeout(r, delay));
    delay = Math.min(delay * 1.25, 4000);
    let result;
    try { result = await api(`/api/tasks/${task.id}`); } catch(e) { continue; }

    // A2A terminal states
    if (result.status === 'completed') {
      renderTaskResult(result, targetAgent);
      return;
    }
    if (result.status === 'failed') {
      appendSystemMsg(`@${esc(targetAgent.name)} Error: ${esc(result.error || 'Unknown')}`);
      return;
    }
    if (result.status === 'canceled') {
      appendSystemMsg(`@${esc(targetAgent.name)} Task was canceled`);
      return;
    }
    if (result.status === 'input-required') {
      appendSystemMsg(`@${esc(targetAgent.name)} needs more input`);
      return;
    }
  }
  appendSystemMsg(`@${esc(targetAgent.name)} — Timeout after 3 minutes`);
}

function renderTaskResult(task, fromAgent) {
  if (!currentAgent) return;
  if (!conversations[currentAgent.id]) conversations[currentAgent.id] = [];

  const prefix = `📬 **@${fromAgent.name}**`;

  if (task.skill_used === 'image_gen' && task.result_image) {
    const msg = {
      role: 'assistant',
      content: `${prefix}: ${task.message}`,
      task_image: task.result_image,
      task_prompt: task.prompt_used || '',
      ts: Date.now()
    };
    const idx = conversations[currentAgent.id].length;
    conversations[currentAgent.id].push(msg);
    const el = document.getElementById('chatMessages');
    if (el) {
      el.insertAdjacentHTML('beforeend', renderMsg(msg, idx));
      scrollToBottom(el);
    }
  } else if (task.result_text) {
    const msg = {
      role: 'assistant',
      content: `${prefix}: ${task.result_text}`,
      ts: Date.now()
    };
    const idx = conversations[currentAgent.id].length;
    conversations[currentAgent.id].push(msg);
    const el = document.getElementById('chatMessages');
    if (el) {
      el.insertAdjacentHTML('beforeend', renderMsg(msg, idx));
      scrollToBottom(el);
    }
  }
}

// ─── ComfyUI image generation (browser-direct, CORS enabled on server) ────────
async function comfyuiGenerate(prompt) {
  const cfg = await api('/api/comfyui/config');
  const baseUrl = cfg.url.replace(/\/$/, '');
  const workflow = cfg.workflow;

  const seed = Math.floor(Math.random() * 2**32);
  for (const node of Object.values(workflow)) {
    if (node.class_type === 'CLIPTextEncode' && node.inputs?.text === '__PROMPT__')
      node.inputs.text = prompt;
    if (node.class_type === 'KSampler')
      node.inputs.seed = seed;
  }

  const queueResp = await fetch(`${baseUrl}/prompt`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ prompt: workflow, client_id: 'agentclaw' })
  });
  if (!queueResp.ok) throw new Error(`ComfyUI ${queueResp.status}: ${(await queueResp.text()).slice(0,200)}`);
  const { prompt_id } = await queueResp.json();

  const deadline = Date.now() + 120000;
  while (Date.now() < deadline) {
    await new Promise(r => setTimeout(r, 2000));
    const hist = await (await fetch(`${baseUrl}/history/${prompt_id}`)).json();
    const entry = hist[prompt_id];
    if (entry?.status?.completed) {
      for (const nodeOut of Object.values(entry.outputs || {})) {
        const imgs = nodeOut.images || [];
        if (imgs.length) {
          const { filename, subfolder, type } = imgs[0];
          const params = new URLSearchParams({ filename, type: type || 'output' });
          if (subfolder) params.set('subfolder', subfolder);
          const blob = await (await fetch(`${baseUrl}/view?${params}`)).blob();
          return await new Promise(r => { const fr = new FileReader(); fr.onload = () => r(fr.result); fr.readAsDataURL(blob); });
        }
      }
    }
  }
  throw new Error('Timeout: ComfyUI did not respond in time');
}

// ─── Memory Dashboard ──────────────────────────────────────────────────────────
async function openMemoryModal() {
  openModal('memoryModal');
  const body = document.getElementById('memoryModalBody');
  body.innerHTML = '<p style="color:var(--textdim);font-size:13px;font-family:var(--mono)">Loading…</p>';
  try {
    const stats = await Promise.all(agents.map(async a => {
      try {
        const info = await api(`/api/memory/${a.id}`);
        return { ...a, memCount: info.count || 0, memError: info.error };
      } catch(e) {
        return { ...a, memCount: 0, memError: e.message };
      }
    }));
    renderMemoryModal(stats);
  } catch(e) {
    body.innerHTML = `<p style="color:var(--red);font-family:var(--mono);font-size:13px">Error: ${esc(e.message)}</p>`;
  }
}

function renderMemoryModal(stats) {
  const body = document.getElementById('memoryModalBody');
  if (!body) return;
  const total = stats.reduce((s, a) => s + a.memCount, 0);
  const rows = stats.map(a => `
    <div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--b1)">
      <div style="flex:1">
        <div style="font-size:13px;font-weight:600;color:var(--textbr)">${esc(a.name)}</div>
        ${a.role ? `<div style="font-size:11px;color:var(--textdim);font-family:var(--mono)">${esc(a.role)}</div>` : ''}
      </div>
      <div style="font-family:var(--mono);font-size:12px;color:${a.memCount > 0 ? 'var(--green)' : 'var(--textdim)'}">
        ${a.memError ? '⚠ ' + esc(a.memError.slice(0,40)) : `🧠 ${a.memCount} memories`}
      </div>
      ${a.memCount > 0 ? `<button class="btn-danger" style="font-size:11px;padding:4px 10px" onclick="clearMemory('${a.id}')">Clear</button>` : ''}
    </div>`).join('');
  body.innerHTML = `
    <div style="font-size:12px;font-family:var(--mono);color:var(--textdim);margin-bottom:12px">
      Total: ${total} stored memories · Vector DB: Qdrant (localhost:6333)
    </div>
    ${rows || '<p style="color:var(--textdim);font-family:var(--mono);font-size:13px">No agents found</p>'}`;
}

async function clearMemory(agentId) {
  if (!confirm('Delete all memories for this agent?')) return;
  try {
    await api(`/api/memory/${agentId}`, { method: 'DELETE' });
    await openMemoryModal();
  } catch(e) {
    alert('Error: ' + e.message);
  }
}

function renderSkillBtns() {
  const el = document.getElementById('skillBtns');
  if (!el || !currentAgent) return;
  const active = new Set(currentAgent.skills || []);
  el.innerHTML = skills.map(s => {
    const on = active.has(s.id);
    const unavail = s.available === false ? ' opacity:.45' : '';
    return `<button class="tool-btn${on ? ' active' : ''}" style="${unavail}"
      title="${esc(s.description)}"
      onclick="toggleSkill('${s.id}')">${s.icon} ${esc(s.name)}</button>`;
  }).join('');
}

async function toggleSkill(skillId) {
  if (!currentAgent) return;
  const active = new Set(currentAgent.skills || []);
  if (active.has(skillId)) active.delete(skillId);
  else active.add(skillId);
  currentAgent.skills = [...active];
  // update in agents array too
  const idx = agents.findIndex(a => a.id === currentAgent.id);
  if (idx >= 0) agents[idx].skills = currentAgent.skills;
  try {
    await api(`/api/agents/${currentAgent.id}`, {
      method: 'PUT',
      body: { skills: currentAgent.skills }
    });
  } catch(e) {}
  renderSkillBtns();
}

// ═══════════════════════════════════════════════════
// Voice Input
// ═══════════════════════════════════════════════════
let voicePressTimer = null;
let voicePttActive = false;

function voiceBtnDown(e) {
  e.preventDefault();
  voicePressTimer = setTimeout(() => {
    voicePressTimer = null;
    // Long press → Push-to-Talk
    voicePttActive = true;
    if (!voiceActive) startVoice(true);
  }, 400);
}

function voiceBtnUp(e) {
  if (voicePressTimer !== null) {
    // Short click → toggle conversation mode
    clearTimeout(voicePressTimer);
    voicePressTimer = null;
    if (voiceActive && !voicePttActive) stopVoice();
    else if (!voiceActive) startVoice(false);
  } else if (voicePttActive) {
    // Release PTT → stop and send immediately
    voicePttActive = false;
    const input = document.getElementById('mainInput');
    const text = (input?.value || voiceBuffer).trim();
    stopVoice();
    if (text) { if (input) input.value = ''; sendMessage(text); }
  }
}

function toggleVoice() {} // kept for compat

function startVoice(ptt = false) {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) { alert('Speech recognition not supported'); return; }

  speechRecognition = new SpeechRecognition();
  speechRecognition.continuous = true;
  speechRecognition.interimResults = true;
  speechRecognition.lang = 'de-DE';

  voiceBuffer = '';

  speechRecognition.onresult = e => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) {
        voiceBuffer += e.results[i][0].transcript + ' ';
      } else {
        interim = e.results[i][0].transcript;
      }
    }
    const input = document.getElementById('mainInput');
    if (input) input.value = voiceBuffer + interim;

    // Auto-send after 1.5s pause (only in conversation mode, not PTT)
    if (!ptt) {
      clearTimeout(voicePauseTimer);
      if (voiceBuffer.trim()) {
        voicePauseTimer = setTimeout(() => {
          if (voiceBuffer.trim()) {
            const text = voiceBuffer.trim();
            voiceBuffer = '';
            if (input) input.value = '';
            sendMessage(text);
          }
        }, 1500);
      }
    }
  };

  speechRecognition.onerror = e => {
    console.error('Speech error:', e.error);
    stopVoice();
  };

  speechRecognition.onend = () => {
    if (voiceActive) speechRecognition.start(); // keep going
  };

  speechRecognition.start();
  voiceActive = true;
  const btn = document.getElementById('voiceBtn');
  btn?.classList.remove('conv', 'ptt');
  btn?.classList.add(ptt ? 'ptt' : 'conv');
  document.getElementById('voiceIndicator')?.classList.add('active');
}

function stopVoice() {
  clearTimeout(voicePauseTimer);
  speechRecognition?.stop();
  voiceActive = false;
  voiceBuffer = '';
  const btn = document.getElementById('voiceBtn');
  btn?.classList.remove('conv', 'ptt');
  document.getElementById('voiceIndicator')?.classList.remove('active');
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function scrollToBottom(el, smooth = true) {
  if (!el) return;
  if (smooth) {
    el.scrollTo({ top: el.scrollHeight, behavior: 'smooth' });
  } else {
    scrollToBottom(el);
  }
}

function agentName(id) {
  return agents.find(a => a.id === id)?.name || id;
}

// Backup Modal
// ═══════════════════════════════════════════════════
async function openBackupModal() {
  const modal = document.getElementById('backupModal') || createBackupModal();
  document.getElementById('backupModalBody').innerHTML = '<p>Laden...</p>';
  openModal('backupModal');
  loadBackupList();
}

function createBackupModal() {
  const div = document.createElement('div');
  div.id = 'backupModal';
  div.className = 'modal-overlay';
  div.innerHTML = `
    <div class="modal" style="max-width:500px">
      <div class="modal-title">
        💾 Backup & Restore
        <button class="close-btn" onclick="closeModal('backupModal')">✕</button>
      </div>
      <div class="modal-body" id="backupModalBody"></div>
      <div class="modal-actions">
        <button class="btn-secondary" onclick="closeModal('backupModal')">Close</button>
      </div>
    </div>
  `;
  document.body.appendChild(div);
  return div;
}

async function loadBackupList() {
  const body = document.getElementById('backupModalBody');
  try {
    const res = await fetch('/api/backup/list');
    const backups = await res.json();
    
    if (!backups.length) {
      body.innerHTML = `
        <p style="color:var(--textdim)">Keine Backups vorhanden.</p>
        <button class="btn-primary" style="margin-top:12px" onclick="createBackup()">💾 Jetzt Backup erstellen</button>
      `;
      return;
    }
    
    let html = '<div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px">';
    for (const b of backups) {
      const sizeMB = (b.size / 1024 / 1024).toFixed(1);
      const date = new Date(b.modified).toLocaleString();
      html += `
        <div style="display:flex;align-items:center;justify-content:space-between;padding:8px;background:var(--bg2);border-radius:6px">
          <div>
            <div style="font-family:var(--mono);font-size:12px">${b.name}</div>
            <div style="font-size:10px;color:var(--textdim)">${date} · ${sizeMB}MB</div>
          </div>
          <div style="display:flex;gap:4px">
            <button class="btn-secondary" style="font-size:11px;padding:4px 8px" onclick="restoreBackup('${b.name}')">♻️ Restore</button>
            <button class="btn-secondary" style="font-size:11px;padding:4px 8px" onclick="downloadBackup('${b.name}')">⬇</button>
          </div>
        </div>
      `;
    }
    html += '</div>';
    
    body.innerHTML = html + '<button class="btn-primary" style="width:100%" onclick="createBackup()">💾 Neues Backup erstellen</button>';
  } catch(e) {
    body.innerHTML = '<p style="color:red">Fehler beim Laden der Backups</p>';
  }
}

async function createBackup() {
  try {
    const res = await fetch('/api/backup', { method: 'POST' });
    const data = await res.json();
    if (data.ok) {
      appendSystemMsg('✅ Backup erstellt: ' + data.backup_file);
      loadBackupList();
    } else {
      alert('Fehler: ' + data.error);
    }
  } catch(e) {
    alert('Fehler: ' + e.message);
  }
}

async function restoreBackup(name) {
  if (!confirm('⚠️ Warnung: Dies überschreibt alle aktuellen Daten! Fortfahren?')) return;
  try {
    const res = await fetch('/api/backup/restore', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ backup_name: name })
    });
    const data = await res.json();
    if (data.ok) {
      alert('✅ Backup restored! Bitte Server neustarten.');
      closeModal('backupModal');
    } else {
      alert('Fehler: ' + data.error);
    }
  } catch(e) {
    alert('Fehler: ' + e.message);
  }
}

function downloadBackup(name) {
  window.open('/api/backup/download/' + name, '_blank');
}
