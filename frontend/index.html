<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgentClaw v3</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0f1117;
    --surface:  #1a1d27;
    --border:   #2a2d3a;
    --accent:   #6366f1;
    --accent2:  #10b981;
    --warn:     #ef4444;
    --text:     #e2e8f0;
    --muted:    #64748b;
    --font:     'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
  }

  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 13px; }

  .layout { display: grid; grid-template-columns: 260px 1fr; grid-template-rows: 48px 1fr; height: 100vh; }

  header {
    grid-column: 1 / -1;
    display: flex; align-items: center; gap: 16px;
    padding: 0 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .logo { color: var(--accent); font-size: 15px; font-weight: 700; letter-spacing: .04em; }
  .logo span { color: var(--accent2); }
  .badge { font-size: 10px; background: var(--accent); color: #fff; padding: 2px 6px; border-radius: 3px; }
  .header-right { margin-left: auto; display: flex; gap: 12px; align-items: center; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
  .lang-toggle { display: flex; gap: 4px; }
  .lang-btn {
    font-size: 10px; padding: 3px 7px; border-radius: 3px; cursor: pointer; border: none;
    background: transparent; color: var(--muted); font-family: var(--font); transition: .15s;
  }
  .lang-btn.active { background: var(--border); color: var(--text); }

  aside {
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 16px 12px;
    overflow-y: auto;
  }
  .section-label { font-size: 10px; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); margin: 16px 0 8px; }
  .section-label:first-child { margin-top: 0; }
  .agent-card {
    padding: 10px 12px; border: 1px solid var(--border); border-radius: 6px;
    margin-bottom: 6px; cursor: pointer; transition: border-color .15s, background .15s;
  }
  .agent-card:hover, .agent-card.active { border-color: var(--accent); background: rgba(99,102,241,.08); }
  .agent-name { font-weight: 600; font-size: 12px; }
  .agent-id { color: var(--muted); font-size: 10px; margin-top: 2px; }
  .agent-ez { font-size: 10px; color: var(--accent2); margin-top: 4px; }

  main { display: flex; flex-direction: column; overflow: hidden; }
  .tabs { display: flex; border-bottom: 1px solid var(--border); padding: 0 20px; background: var(--surface); }
  .tab { padding: 12px 16px; font-size: 12px; cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent; transition: .15s; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .content { flex: 1; overflow: hidden; display: flex; flex-direction: column; padding: 20px; gap: 16px; }

  .chat-area { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
  .msg { max-width: 80%; padding: 10px 14px; border-radius: 8px; line-height: 1.5; font-size: 12px; }
  .msg.user  { align-self: flex-end; background: var(--accent); color: #fff; border-radius: 8px 8px 2px 8px; }
  .msg.agent { align-self: flex-start; background: var(--surface); border: 1px solid var(--border); border-radius: 8px 8px 8px 2px; }
  .msg .meta { font-size: 10px; color: var(--muted); margin-top: 4px; }
  .msg.agent .meta { color: var(--accent2); }

  .chat-input-row { display: flex; gap: 8px; }
  .chat-input-row input {
    flex: 1; background: var(--surface); border: 1px solid var(--border); color: var(--text);
    padding: 10px 14px; border-radius: 6px; font-family: var(--font); font-size: 12px; outline: none;
    transition: border-color .15s;
  }
  .chat-input-row input:focus { border-color: var(--accent); }

  button {
    background: var(--accent); color: #fff; border: none; padding: 10px 18px;
    border-radius: 6px; cursor: pointer; font-family: var(--font); font-size: 12px; transition: opacity .15s;
  }
  button:hover { opacity: .85; }
  button:disabled { opacity: .4; cursor: default; }

  table { width: 100%; border-collapse: collapse; font-size: 11px; }
  th { text-align: left; padding: 6px 10px; color: var(--muted); border-bottom: 1px solid var(--border); }
  td { padding: 6px 10px; border-bottom: 1px solid var(--border); }
  td.state-completed { color: var(--accent2); }
  td.state-failed, td.state-timeout { color: var(--warn); }
  td.state-running { color: var(--accent); }
  tr { cursor: pointer; transition: background .1s; }
  tr:hover td { background: rgba(255,255,255,.02); }

  .spacetime-wrap { flex: 1; overflow: auto; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; }
  .cdc-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; font-size: 11px; }
  .cdc-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid var(--border); }
  .cdc-row:last-child { border: none; }
  .cdc-key { color: var(--muted); }
  .cdc-val { color: var(--accent2); font-weight: 600; }

  .empty { color: var(--muted); text-align: center; padding: 40px; }
  .view { display: none; flex-direction: column; flex: 1; overflow: hidden; gap: 16px; }
  .view.active { display: flex; }

  .thinking { opacity: .5; animation: pulse 1.2s infinite; }
  @keyframes pulse { 0%,100%{opacity:.5} 50%{opacity:.9} }
</style>
</head>
<body>
<div class="layout">

  <header>
    <div class="logo">Agent<span>Claw</span></div>
    <div class="badge">v3</div>
    <div style="color:var(--muted);font-size:11px;">CDC-native · Team Protocol · A2A Gateway</div>
    <div class="header-right">
      <span id="agent-count" style="color:var(--muted);font-size:11px;">— agents</span>
      <div class="lang-toggle">
        <button class="lang-btn active" id="lang-en" onclick="setLocale('en')">EN</button>
        <button class="lang-btn" id="lang-de" onclick="setLocale('de')">DE</button>
      </div>
      <div class="status-dot" id="status-dot"></div>
    </div>
  </header>

  <aside>
    <div class="section-label" data-i18n="sidebar.agents">Agents</div>
    <div id="agent-list"></div>
    <div class="section-label" data-i18n="sidebar.quickstart">Quick Start</div>
    <div style="color:var(--muted);font-size:11px;line-height:1.6;" data-i18n="sidebar.hint">
      Select an agent, type a message in Chat.
    </div>
  </aside>

  <main>
    <div class="tabs">
      <div class="tab active" onclick="switchTab('chat')" data-i18n="nav.chat">Chat</div>
      <div class="tab" onclick="switchTab('missions')" data-i18n="nav.missions">Missions</div>
      <div class="tab" onclick="switchTab('spacetime')" data-i18n="nav.spacetime">Spacetime</div>
      <div class="tab" onclick="switchTab('status')" data-i18n="nav.status">Status</div>
    </div>

    <div class="content">

      <!-- Chat -->
      <div id="view-chat" class="view active">
        <div class="chat-area" id="chat-area">
          <div class="empty" data-i18n="chat.empty">Select an agent and write a message.</div>
        </div>
        <div class="chat-input-row">
          <input id="chat-input" data-i18n-placeholder="chat.placeholder" placeholder="Message …" onkeydown="if(event.key==='Enter')sendChat()">
          <button id="send-btn" onclick="sendChat()" data-i18n="chat.send">Send</button>
        </div>
      </div>

      <!-- Missions -->
      <div id="view-missions" class="view">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <span style="color:var(--muted);font-size:11px;" id="missions-count">—</span>
          <button onclick="loadMissions()" style="padding:6px 12px;font-size:11px;" data-i18n="missions.refresh">Refresh</button>
        </div>
        <div style="overflow:auto;flex:1;">
          <table>
            <thead><tr>
              <th data-i18n="missions.col.id">ID</th>
              <th data-i18n="missions.col.title">Title</th>
              <th data-i18n="missions.col.state">State</th>
            </tr></thead>
            <tbody id="missions-tbody"></tbody>
          </table>
        </div>
      </div>

      <!-- Spacetime -->
      <div id="view-spacetime" class="view">
        <div style="display:flex;gap:8px;align-items:center;">
          <input id="spacetime-mid" data-i18n-placeholder="spacetime.placeholder" placeholder="Mission ID …"
            style="background:var(--surface);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:6px;font-family:var(--font);font-size:12px;outline:none;flex:1;">
          <button onclick="loadSpacetime()" style="padding:8px 14px;font-size:12px;" data-i18n="spacetime.load">Load</button>
        </div>
        <div class="spacetime-wrap" id="spacetime-wrap">
          <div class="empty" data-i18n="spacetime.empty">Enter a Mission ID and load.</div>
        </div>
      </div>

      <!-- Status -->
      <div id="view-status" class="view">
        <div class="cdc-panel" id="status-panel">
          <div class="empty" data-i18n="status.loading">Loading…</div>
        </div>
      </div>

    </div>
  </main>
</div>

<script>
// ── i18n ──────────────────────────────────────────────────────────────────────
const I18N = {
  en: {
    "nav.chat": "Chat", "nav.missions": "Missions", "nav.spacetime": "Spacetime", "nav.status": "Status",
    "sidebar.agents": "Agents", "sidebar.quickstart": "Quick Start",
    "sidebar.hint": "Select an agent, type a message in Chat.",
    "chat.empty": "Select an agent and write a message.",
    "chat.placeholder": "Message …", "chat.send": "Send",
    "chat.select_agent": "Please select an agent first.",
    "missions.refresh": "Refresh", "missions.col.id": "ID",
    "missions.col.title": "Title", "missions.col.state": "State",
    "missions.count": "{n} missions",
    "spacetime.placeholder": "Mission ID …", "spacetime.load": "Load",
    "spacetime.empty": "Enter a Mission ID and load.",
    "spacetime.not_found": "Mission not found.",
    "spacetime.no_data": "No data.",
    "spacetime.drift_warning": "⚠ {n} causal drift edge(s) detected (red dashed)",
    "status.loading": "Loading…",
  },
  de: {
    "nav.chat": "Chat", "nav.missions": "Missionen", "nav.spacetime": "Raumzeit", "nav.status": "Status",
    "sidebar.agents": "Agenten", "sidebar.quickstart": "Schnellstart",
    "sidebar.hint": "Wähle einen Agenten und schreibe eine Nachricht.",
    "chat.empty": "Wähle einen Agenten und schreibe eine Nachricht.",
    "chat.placeholder": "Nachricht …", "chat.send": "Senden",
    "chat.select_agent": "Bitte zuerst einen Agenten auswählen.",
    "missions.refresh": "Aktualisieren", "missions.col.id": "ID",
    "missions.col.title": "Titel", "missions.col.state": "Status",
    "missions.count": "{n} Missionen",
    "spacetime.placeholder": "Mission-ID …", "spacetime.load": "Laden",
    "spacetime.empty": "Mission-ID eingeben und laden.",
    "spacetime.not_found": "Mission nicht gefunden.",
    "spacetime.no_data": "Keine Daten.",
    "spacetime.drift_warning": "⚠ {n} Kausaler-Drift-Kante(n) erkannt (rot gestrichelt)",
    "status.loading": "Lade …",
  },
};

let locale = navigator.language.startsWith('de') ? 'de' : 'en';

function t(key, vars = {}) {
  let s = I18N[locale]?.[key] || I18N.en[key] || key;
  Object.entries(vars).forEach(([k, v]) => { s = s.replace(`{${k}}`, v); });
  return s;
}

function applyI18n() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.dataset.i18n);
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    el.placeholder = t(el.dataset.i18nPlaceholder);
  });
  document.getElementById('lang-en').classList.toggle('active', locale === 'en');
  document.getElementById('lang-de').classList.toggle('active', locale === 'de');
  document.documentElement.lang = locale;
}

function setLocale(l) {
  locale = l;
  applyI18n();
}

// ── State ─────────────────────────────────────────────────────────────────────
const API = '';
let selectedAgent = null;

// ── Boot ─────────────────────────────────────────────────────────────────────
async function boot() {
  applyI18n();
  await loadAgents();
  loadStatus();
}

// ── Agents ────────────────────────────────────────────────────────────────────
async function loadAgents() {
  try {
    const res = await fetch(`${API}/api/agents`);
    const agents = await res.json();
    const dot = document.getElementById('status-dot');
    dot.style.background = 'var(--accent2)';
    dot.style.boxShadow = '0 0 6px var(--accent2)';
    document.getElementById('agent-count').textContent = `${agents.length} agents`;

    const list = document.getElementById('agent-list');
    list.innerHTML = '';
    agents.forEach(a => {
      const ez = a.clock?.vector ? Object.values(a.clock.vector).reduce((s,v)=>s+v,0) : 0;
      const card = document.createElement('div');
      card.className = 'agent-card' + (selectedAgent === a.agent_id ? ' active' : '');
      card.dataset.id = a.agent_id;
      card.innerHTML = `
        <div class="agent-name">${esc(a.name)}</div>
        <div class="agent-id">${esc(a.agent_id)}</div>
        <div class="agent-ez">ez=${ez} · ops=${a.op_count || 0}</div>
      `;
      card.addEventListener('click', () => selectAgent(a.agent_id, a.name, card));
      list.appendChild(card);
    });
  } catch {
    document.getElementById('status-dot').style.background = 'var(--warn)';
  }
}

function selectAgent(id, name, card) {
  selectedAgent = id;
  document.querySelectorAll('.agent-card').forEach(c => c.classList.remove('active'));
  card.classList.add('active');
  document.getElementById('chat-input').placeholder = `${t('chat.placeholder').replace('…', '')}${name} …`;
}

// ── Chat ──────────────────────────────────────────────────────────────────────
async function sendChat() {
  const input = document.getElementById('chat-input');
  const btn = document.getElementById('send-btn');
  const msg = input.value.trim();
  if (!msg) return;
  if (!selectedAgent) { appendMsg('system', t('chat.select_agent')); return; }

  appendMsg('user', msg);
  input.value = '';
  btn.disabled = true;

  const thinkingEl = appendMsg('agent', '…', selectedAgent);
  thinkingEl.classList.add('thinking');

  const es = new EventSource(`${API}/api/chat/stream?agent_id=${encodeURIComponent(selectedAgent)}&message=${encodeURIComponent(msg)}`);
  es.onmessage = (e) => {
    const data = JSON.parse(e.data);

    if (data.event === 'message' && data.type === 'response') {
      const result = data.payload?.result ?? '';
      thinkingEl.classList.remove('thinking');
      thinkingEl.querySelector('.text').textContent = result;
      if (data.clock) {
        thinkingEl.querySelector('.meta').textContent = clockSummary(data.clock);
      }
    }

    if (data.event === 'task_completed' || data.event === 'task_failed' || data.event === 'task_timeout') {
      es.close();
      btn.disabled = false;
      thinkingEl.classList.remove('thinking');
      loadAgents();
      loadMissions();
    }

    if (data.event === 'timeout') {
      thinkingEl.querySelector('.text').textContent = '[timeout]';
      thinkingEl.classList.remove('thinking');
      es.close();
      btn.disabled = false;
    }
  };
  es.onerror = () => { es.close(); btn.disabled = false; thinkingEl.classList.remove('thinking'); };
}

function appendMsg(type, text, agentId = '') {
  const area = document.getElementById('chat-area');
  area.querySelectorAll('.empty').forEach(e => e.remove());
  const div = document.createElement('div');
  div.className = `msg ${type}`;
  div.innerHTML = `<div class="text">${esc(text)}</div><div class="meta">${esc(agentId)}</div>`;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
  return div;
}

function clockSummary(clock) {
  if (!clock?.vector) return '';
  return Object.entries(clock.vector).map(([k, v]) => `${k.replace('agent:','')}:ez=${v}`).join(' · ');
}

// ── Missions ──────────────────────────────────────────────────────────────────
async function loadMissions() {
  const res = await fetch(`${API}/api/missions`);
  const missions = await res.json();
  document.getElementById('missions-count').textContent = t('missions.count', {n: missions.length});
  const tbody = document.getElementById('missions-tbody');
  tbody.innerHTML = '';
  missions.slice().reverse().forEach(m => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td style="font-size:10px;color:var(--muted)">${esc(m.mission_id)}</td>
      <td>${esc(m.title || '')}</td>
      <td class="state-${m.state}">${m.state}</td>
    `;
    tr.addEventListener('click', () => {
      document.getElementById('spacetime-mid').value = m.mission_id;
      switchTab('spacetime');
      loadSpacetime();
    });
    tbody.appendChild(tr);
  });
}

// ── Spacetime ─────────────────────────────────────────────────────────────────
async function loadSpacetime() {
  const mid = document.getElementById('spacetime-mid').value.trim();
  if (!mid) return;
  try {
    const res = await fetch(`${API}/api/missions/${mid}/spacetime`);
    if (!res.ok) {
      document.getElementById('spacetime-wrap').innerHTML = `<div class="empty">${t('spacetime.not_found')}</div>`;
      return;
    }
    renderSpacetime(await res.json());
  } catch(e) {
    document.getElementById('spacetime-wrap').innerHTML = `<div class="empty">${esc(e.message)}</div>`;
  }
}

function renderSpacetime(data) {
  const wrap = document.getElementById('spacetime-wrap');
  const agents = data.agents || [];
  const nodes = data.nodes || [];
  const edges = data.edges || [];

  if (!agents.length) { wrap.innerHTML = `<div class="empty">${t('spacetime.no_data')}</div>`; return; }

  const W = Math.max(600, agents.length * 180);
  const H = 400;
  const PAD = {top:50, bottom:30, left:40, right:40};
  const PLOT_W = W - PAD.left - PAD.right;
  const PLOT_H = H - PAD.top - PAD.bottom;
  const COL_W = PLOT_W / Math.max(agents.length, 1);
  const agentX = {};
  agents.forEach((a, i) => { agentX[a] = PAD.left + i * COL_W + COL_W / 2; });
  const maxEZ = Math.max(1, ...nodes.map(n => n.eigenzeit || 0));
  const ezY = ez => PAD.top + PLOT_H * (1 - ez / maxEZ);
  const COLORS = ['#6366f1','#10b981','#f59e0b','#ec4899','#06b6d4','#84cc16'];
  const agentColor = {};
  agents.forEach((a, i) => { agentColor[a] = COLORS[i % COLORS.length]; });
  const MSG_COLOR = {request:'#6366f1', response:'#10b981', error:'#ef4444', heartbeat:'#f59e0b', cancel:'#f87171'};

  let svg = `<svg width="${W}" height="${H}" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr-ord" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#a78bfa"/></marker>
    <marker id="arr-drift" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#ef4444"/></marker>
    <filter id="glow"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="${W}" height="${H}" fill="#1a1d27" rx="8"/>`;

  for (let i = 0; i <= 4; i++) {
    const y = PAD.top + (PLOT_H * i / 4);
    svg += `<line x1="${PAD.left}" y1="${y}" x2="${W-PAD.right}" y2="${y}" stroke="#2a2d3a"/>`;
  }

  agents.forEach(a => {
    const x = agentX[a]; const col = agentColor[a];
    const label = a.replace(/^(agent:|ext:|a2a:)/, '');
    svg += `<line x1="${x}" y1="${PAD.top}" x2="${x}" y2="${H-PAD.bottom}" stroke="${col}" stroke-opacity=".3"/>`;
    svg += `<rect x="${x-30}" y="${PAD.top-28}" width="60" height="20" rx="4" fill="${col}" fill-opacity=".15" stroke="${col}" stroke-opacity=".4"/>`;
    svg += `<text x="${x}" y="${PAD.top-14}" text-anchor="middle" fill="${col}" font-size="11" font-family="monospace">${label}</text>`;
  });

  edges.forEach(e => {
    const x1 = agentX[e.from_agent], x2 = agentX[e.to_agent];
    const y1 = ezY(e.from_ez||0), y2 = ezY(e.to_ez||0);
    if (!x1 || !x2) return;
    const isDrift = e.relation?.includes('drift');
    const col = isDrift ? '#ef4444' : '#a78bfa';
    const cx = (x1+x2)/2;
    svg += `<path d="M${x1},${y1} C${cx},${y1} ${cx},${y2} ${x2},${y2}" stroke="${col}" stroke-width="${isDrift?2:1.2}" fill="none" ${isDrift?'stroke-dasharray="5,4"':''} marker-end="url(#${isDrift?'arr-drift':'arr-ord'})" opacity=".8"/>`;
  });

  nodes.forEach(n => {
    const x = agentX[n.agent]; if (!x) return;
    const y = ezY(n.eigenzeit||0);
    const col = MSG_COLOR[n.type] || '#6366f1';
    svg += `<circle cx="${x}" cy="${y}" r="5" fill="${col}" filter="url(#glow)" opacity=".9"/>`;
  });

  for (let i = 0; i <= 4; i++) {
    const ez = Math.round(maxEZ * i / 4);
    svg += `<text x="${PAD.left-4}" y="${ezY(ez)+4}" text-anchor="end" fill="#64748b" font-size="9" font-family="monospace">${ez}</text>`;
  }

  svg += `</svg>`;
  wrap.innerHTML = svg;

  if (data.drift_segments?.length) {
    const hint = document.createElement('div');
    hint.style.cssText = 'padding:8px 14px;font-size:11px;color:#ef4444;border-top:1px solid var(--border)';
    hint.textContent = t('spacetime.drift_warning', {n: data.drift_segments.length});
    wrap.appendChild(hint);
  }
}

// ── Status ────────────────────────────────────────────────────────────────────
async function loadStatus() {
  try {
    const data = await (await fetch(`${API}/api/status`)).json();
    const panel = document.getElementById('status-panel');
    panel.innerHTML = data.agents.map(a =>
      `<div class="cdc-row"><span class="cdc-key">${esc(a.agent_id)}</span><span class="cdc-val">ops=${a.op_count} V=${JSON.stringify(a.clock?.vector||{})}</span></div>`
    ).join('') || `<div class="empty">${t('status.loading')}</div>`;
  } catch {}
}

// ── Tabs ──────────────────────────────────────────────────────────────────────
function switchTab(name) {
  const names = ['chat','missions','spacetime','status'];
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', names[i] === name));
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(`view-${name}`).classList.add('active');
  if (name === 'missions') loadMissions();
  if (name === 'status') loadStatus();
}

// ── Util ──────────────────────────────────────────────────────────────────────
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

boot();
setInterval(loadAgents, 10000);
</script>
</body>
</html>
