<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover" />
<title>NEON DRIFT</title>
<!-- Mobile: Browser-Leisten in der Hintergrundfarbe des Spiels -->
<meta name="theme-color" content="#03050b" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Neon Drift" />
<meta name="description" content="Neon Drift — ein Vektor-Arcade-Shooter im CRT-Stil. Treibe durch das Trümmerfeld, knacke die Drifter, überlebe die Jäger." />
<style>
  :root {
    --cyan: #6ef0ff;
    --mag:  #ff4fd8;
    --yel:  #ffd34a;
    --red:  #ff5577;
    --grn:  #7bff9a;
    --ink:  #cfe8ff;
    --bg0:  #03050b;
    --bg1:  #070b18;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    background: radial-gradient(ellipse at 50% 38%, var(--bg1) 0%, var(--bg0) 70%, #000 100%);
    color: var(--ink);
    font-family: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    overflow: hidden; user-select: none;
    -webkit-user-select: none; -webkit-tap-highlight-color: transparent;
    touch-action: none;
  }
  #stage { position: fixed; inset: 0; display: grid; place-items: center; }
  canvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
  #game     { z-index: 1; }
  #bloom    { z-index: 2; pointer-events: none; mix-blend-mode: screen; opacity: .9;
              filter: blur(7px) saturate(150%); }
  #scanlines{
    position: fixed; inset: 0; z-index: 3; pointer-events: none;
    background:
      repeating-linear-gradient(0deg, rgba(255,255,255,.022) 0 1px, transparent 1px 3px),
      radial-gradient(ellipse at 50% 50%, transparent 55%, rgba(0,0,0,.55) 100%);
  }

  /* ---- HUD ---- */
  #hud {
    position: fixed; inset: 0; z-index: 4; pointer-events: none;
    display: flex; flex-direction: column; justify-content: space-between;
    padding: max(14px, env(safe-area-inset-top)) 18px 18px;
    font-size: clamp(11px, 2.6vw, 15px); letter-spacing: .12em;
    text-shadow: 0 0 8px currentColor;
  }
  #hud .row { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
  #hud .stat { opacity: .92; }
  #hud .label { font-size: .68em; opacity: .55; letter-spacing: .22em; }
  #score  { color: var(--cyan); font-size: 1.5em; }
  #wave   { color: var(--mag); text-align: center; }
  #best   { color: var(--yel); text-align: right; }
  #lives  { color: var(--grn); letter-spacing: .18em; font-size: 1.25em; }
  #combo  { color: var(--yel); text-align: right; min-height: 1em; transition: opacity .2s; }

  /* ---- Overlays ---- */
  #overlay {
    position: fixed; inset: 0; z-index: 6;
    display: grid; place-items: center; text-align: center;
    background: radial-gradient(ellipse at 50% 50%, rgba(3,5,11,.55), rgba(3,5,11,.92));
    backdrop-filter: blur(2px); padding: 24px;
  }
  #overlay.hidden { display: none; }
  .panel { max-width: 540px; }
  h1 {
    margin: 0 0 .1em; font-size: clamp(38px, 13vw, 96px); font-weight: 800;
    letter-spacing: .04em; line-height: .92;
    color: #fff;
    text-shadow: 0 0 14px var(--cyan), 0 0 36px var(--mag), 0 0 70px var(--mag);
  }
  h1 .d { color: var(--mag); text-shadow: 0 0 14px var(--mag), 0 0 40px var(--mag); }
  .tag { color: var(--ink); opacity: .8; font-size: clamp(12px, 3.4vw, 16px); letter-spacing: .26em; margin: 0 0 1.6em; }
  .keys { opacity: .72; font-size: clamp(11px, 2.9vw, 14px); line-height: 2; letter-spacing: .08em; }
  .keys b { color: var(--cyan); font-weight: 600; }
  .big { color: var(--yel); font-size: clamp(20px, 6vw, 34px); margin: .3em 0; text-shadow: 0 0 16px var(--yel); }
  .sub { opacity: .7; font-size: clamp(12px, 3.2vw, 15px); letter-spacing: .14em; }
  .btn {
    pointer-events: auto; cursor: pointer; margin-top: 1.5em;
    display: inline-block; padding: .7em 1.8em; border: 1.5px solid var(--cyan);
    border-radius: 4px; color: var(--cyan); background: rgba(110,240,255,.06);
    font: inherit; font-size: clamp(13px, 3.6vw, 17px); letter-spacing: .22em;
    text-shadow: 0 0 8px var(--cyan); box-shadow: 0 0 18px rgba(110,240,255,.25) inset, 0 0 22px rgba(110,240,255,.18);
    transition: transform .08s, background .15s;
  }
  .btn:active { transform: scale(.96); background: rgba(110,240,255,.16); }
  .blink { animation: blink 1.1s steps(2,end) infinite; }
  @keyframes blink { 50% { opacity: .25; } }

  /* ---- Touch controls ---- */
  #touch { position: fixed; inset: 0; z-index: 5; pointer-events: none; display: none; }
  #touch.on { display: block; }
  .tpad {
    position: absolute; bottom: max(22px, env(safe-area-inset-bottom)); width: 88px; height: 88px;
    border-radius: 50%; border: 1.5px solid rgba(110,240,255,.4);
    background: radial-gradient(circle, rgba(110,240,255,.10), transparent 70%);
    pointer-events: auto; display: grid; place-items: center;
    color: var(--cyan); text-shadow: 0 0 8px var(--cyan); font-size: 24px;
    -webkit-user-select: none; user-select: none;
  }
  .tpad:active { background: radial-gradient(circle, rgba(110,240,255,.28), transparent 70%); }
  #t-left  { left: 18px; }
  #t-right { left: 122px; }
  #t-thrust{ right: 18px; bottom: calc(max(22px, env(safe-area-inset-bottom)) + 96px); }
  #t-fire  { right: 18px; border-color: rgba(255,79,216,.5); color: var(--mag);
             text-shadow: 0 0 8px var(--mag); width: 96px; height: 96px; }
</style>
</head>
<body>
<div id="stage">
  <canvas id="game"></canvas>
  <canvas id="bloom"></canvas>
</div>
<div id="scanlines"></div>

<div id="hud" aria-hidden="true">
  <div class="row">
    <div class="stat"><div class="label">SCORE</div><div id="score">0</div></div>
    <div class="stat"><div class="label">WAVE</div><div id="wave">1</div></div>
    <div class="stat"><div class="label">BEST</div><div id="best">0</div></div>
  </div>
  <div class="row">
    <div class="stat"><div id="lives">▲ ▲ ▲</div></div>
    <div class="stat"><div id="combo"></div></div>
  </div>
</div>

<div id="touch">
  <div class="tpad" id="t-left">◀</div>
  <div class="tpad" id="t-right">▶</div>
  <div class="tpad" id="t-thrust">▲</div>
  <div class="tpad" id="t-fire">●</div>
</div>

<div id="overlay">
  <div class="panel" id="panel"></div>
</div>

<script>
"use strict";
/* ============================================================================
   NEON DRIFT  —  ein Vektor-Arcade-Shooter im CRT-Stil
   Single-File. Keine Abhängigkeiten. Kein Build-Schritt.

   Aufbau:
     1.  UTIL        — Mathe-/Hilfsfunktionen
     2.  GFX         — Canvas-Zeichenprimitiven (Glow-Linien, Polygone, Partikel …)
     3.  SFX         — WebAudio-Synth-Soundeffekte
     4.  INPUT        — Tastatur + Touch
     5.  ENTITIES     — Ship, Bullet, Rock, Hunter, Particle, Star
     6.  GAME         — Zustandsautomat, Wellen, Kollisionen, Score, Loop
   ============================================================================ */

/* ---------------------------------------------------------------------------
   1. UTIL
   ------------------------------------------------------------------------- */
const TAU = Math.PI * 2;
const rand   = (a, b) => a + Math.random() * (b - a);
const randi  = (a, b) => Math.floor(rand(a, b + 1));
const pick   = arr => arr[(Math.random() * arr.length) | 0];
const clamp  = (v, lo, hi) => v < lo ? lo : v > hi ? hi : v;
const lerp   = (a, b, t) => a + (b - a) * t;
const hypot2 = (x, y) => x * x + y * y;
const sign   = Math.sign;

/* kürzeste Winkeldifferenz nach [-PI, PI] */
function angDiff(a, b) {
  let d = (b - a) % TAU;
  if (d > Math.PI) d -= TAU;
  if (d < -Math.PI) d += TAU;
  return d;
}

/* ---------------------------------------------------------------------------
   2. GFX  —  Canvas-Zeichenprimitiven
   Alles wird in Weltkoordinaten gezeichnet; Toroid-Wrap geschieht über
   das mehrfache Zeichnen mit Offset, wenn ein Objekt den Rand berührt.
   ------------------------------------------------------------------------- */
const GFX = (() => {
  const game  = document.getElementById('game');
  const bloom = document.getElementById('bloom');
  const gctx  = game.getContext('2d');
  const bctx  = bloom.getContext('2d');

  let W = 0, H = 0, DPR = 1;

  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = Math.round(window.innerWidth);
    H = Math.round(window.innerHeight);
    for (const [cv, cx] of [[game, gctx], [bloom, bctx]]) {
      cv.width  = Math.round(W * DPR);
      cv.height = Math.round(H * DPR);
      cx.setTransform(DPR, 0, 0, DPR, 0, 0);
      cx.lineJoin = 'round';
      cx.lineCap  = 'round';
    }
  }
  window.addEventListener('resize', resize, { passive: true });
  resize();

  /* Trails: leichtes Nachleuchten statt hartem Clear → CRT-Phosphor-Look */
  function frame(fade) {
    gctx.globalCompositeOperation = 'source-over';
    gctx.fillStyle = `rgba(3,5,11,${fade})`;
    gctx.fillRect(0, 0, W, H);
    // Bloom-Layer löscht der CSS-Blur weicher; stärker ausblenden
    bctx.globalCompositeOperation = 'source-over';
    bctx.fillStyle = 'rgba(3,5,11,0.30)';
    bctx.fillRect(0, 0, W, H);
    gctx.globalCompositeOperation = 'lighter';
    bctx.globalCompositeOperation = 'lighter';
  }

  /* Glühende Vektorlinie (Polylinie). pts = [x0,y0, x1,y1, …] */
  function poly(pts, color, width, close, glow) {
    for (const cx of [gctx, bctx]) {
      cx.beginPath();
      cx.moveTo(pts[0], pts[1]);
      for (let i = 2; i < pts.length; i += 2) cx.lineTo(pts[i], pts[i + 1]);
      if (close) cx.closePath();
      cx.strokeStyle = color;
      cx.lineWidth = cx === bctx ? width * 1.6 : width;
      cx.globalAlpha = cx === bctx ? (glow ?? 0.9) : 1;
      cx.stroke();
    }
    gctx.globalAlpha = bctx.globalAlpha = 1;
  }

  function circle(x, y, r, color, width, fill) {
    for (const cx of [gctx, bctx]) {
      cx.beginPath();
      cx.arc(x, y, r, 0, TAU);
      if (fill) { cx.fillStyle = color; cx.globalAlpha = cx === bctx ? 0.7 : 1; cx.fill(); }
      else { cx.strokeStyle = color; cx.lineWidth = cx === bctx ? width * 1.6 : width;
             cx.globalAlpha = cx === bctx ? 0.85 : 1; cx.stroke(); }
    }
    gctx.globalAlpha = bctx.globalAlpha = 1;
  }

  /* Weicher Leucht-Punkt (Partikel / Schüsse) nur auf Bloom + Kern auf Game */
  function spark(x, y, r, color, a) {
    gctx.globalAlpha = a;
    gctx.fillStyle = color;
    gctx.beginPath(); gctx.arc(x, y, r, 0, TAU); gctx.fill();
    bctx.globalAlpha = a * 0.9;
    bctx.fillStyle = color;
    bctx.beginPath(); bctx.arc(x, y, r * 2.1, 0, TAU); bctx.fill();
    gctx.globalAlpha = bctx.globalAlpha = 1;
  }

  function text(str, x, y, color, size, align) {
    gctx.globalCompositeOperation = 'source-over';
    gctx.font = `700 ${size}px "JetBrains Mono", ui-monospace, monospace`;
    gctx.textAlign = align || 'center';
    gctx.textBaseline = 'middle';
    gctx.fillStyle = color;
    gctx.shadowColor = color; gctx.shadowBlur = size * 0.7;
    gctx.fillText(str, x, y);
    gctx.shadowBlur = 0;
    gctx.globalCompositeOperation = 'lighter';
  }

  return {
    get W() { return W; }, get H() { return H; },
    gctx, bctx, resize, frame, poly, circle, spark, text,
  };
})();

/* ---------------------------------------------------------------------------
   3. SFX  —  prozeduraler WebAudio-Synth (kein Asset nötig)
   ------------------------------------------------------------------------- */
const SFX = (() => {
  let ac = null, master = null, muted = false;
  function ensure() {
    if (ac) return;
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return;
    ac = new AC();
    master = ac.createGain();
    master.gain.value = 0.5;
    master.connect(ac.destination);
  }
  function resume() { ensure(); if (ac && ac.state === 'suspended') ac.resume(); }

  function blip(freq, dur, type, vol, slideTo) {
    if (muted) return;
    ensure(); if (!ac) return;
    const t = ac.currentTime;
    const o = ac.createOscillator();
    const g = ac.createGain();
    o.type = type || 'square';
    o.frequency.setValueAtTime(freq, t);
    if (slideTo) o.frequency.exponentialRampToValueAtTime(Math.max(20, slideTo), t + dur);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(vol ?? 0.3, t + 0.008);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.connect(g); g.connect(master);
    o.start(t); o.stop(t + dur + 0.02);
  }
  function noise(dur, vol, lpFrom, lpTo) {
    if (muted) return;
    ensure(); if (!ac) return;
    const t = ac.currentTime;
    const len = Math.floor(ac.sampleRate * dur);
    const buf = ac.createBuffer(1, len, ac.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / len);
    const src = ac.createBufferSource(); src.buffer = buf;
    const lp = ac.createBiquadFilter(); lp.type = 'lowpass';
    lp.frequency.setValueAtTime(lpFrom ?? 1800, t);
    lp.frequency.exponentialRampToValueAtTime(lpTo ?? 200, t + dur);
    const g = ac.createGain();
    g.gain.setValueAtTime(vol ?? 0.4, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    src.connect(lp); lp.connect(g); g.connect(master);
    src.start(t); src.stop(t + dur);
  }

  return {
    resume,
    toggle() { muted = !muted; return muted; },
    get muted() { return muted; },
    shoot()    { blip(880, 0.12, 'square',   0.16, 220); },
    thrust()   { /* per-Frame zu teuer; stattdessen leiser Tick */ },
    bangBig()  { noise(0.5, 0.5, 1400, 90); blip(120, 0.4, 'sawtooth', 0.18, 40); },
    bangMid()  { noise(0.32, 0.4, 1600, 140); blip(200, 0.25, 'sawtooth', 0.14, 60); },
    bangSmall(){ noise(0.2, 0.3, 2200, 300); },
    hunter()   { blip(440, 0.18, 'sawtooth', 0.12, 880); },
    hurt()     { blip(160, 0.5, 'triangle', 0.3, 50); noise(0.4, 0.3, 800, 80); },
    extra()    { blip(660, 0.1, 'square', 0.2); setTimeout(() => blip(990, 0.16, 'square', 0.2), 90); },
    wave()     { blip(330, 0.12, 'triangle', 0.18); setTimeout(() => blip(495, 0.18, 'triangle', 0.18), 110); },
  };
})();

/* ---------------------------------------------------------------------------
   4. INPUT
   ------------------------------------------------------------------------- */
const Input = (() => {
  const k = { left: false, right: false, thrust: false, fire: false, hyper: false };
  let firePressed = false, hyperPressed = false;

  const down = e => {
    const c = e.code;
    if (c === 'ArrowLeft'  || c === 'KeyA') k.left = true;
    else if (c === 'ArrowRight' || c === 'KeyD') k.right = true;
    else if (c === 'ArrowUp' || c === 'KeyW') k.thrust = true;
    else if (c === 'Space') { if (!k.fire) firePressed = true; k.fire = true; }
    else if (c === 'ShiftLeft' || c === 'ShiftRight' || c === 'KeyH') { if (!k.hyper) hyperPressed = true; k.hyper = true; }
    else return;
    e.preventDefault();
  };
  const up = e => {
    const c = e.code;
    if (c === 'ArrowLeft'  || c === 'KeyA') k.left = false;
    else if (c === 'ArrowRight' || c === 'KeyD') k.right = false;
    else if (c === 'ArrowUp' || c === 'KeyW') k.thrust = false;
    else if (c === 'Space') k.fire = false;
    else if (c === 'ShiftLeft' || c === 'ShiftRight' || c === 'KeyH') k.hyper = false;
  };
  window.addEventListener('keydown', down);
  window.addEventListener('keyup', up);

  /* Touch */
  function bindPad(id, on) {
    const el = document.getElementById(id);
    const set = v => e => { e.preventDefault(); on(v); };
    el.addEventListener('touchstart', set(true),  { passive: false });
    el.addEventListener('touchend',   set(false), { passive: false });
    el.addEventListener('touchcancel',set(false), { passive: false });
  }
  function initTouch() {
    bindPad('t-left',   v => k.left = v);
    bindPad('t-right',  v => k.right = v);
    bindPad('t-thrust', v => k.thrust = v);
    bindPad('t-fire',   v => { if (v && !k.fire) firePressed = true; k.fire = v; });
  }

  return {
    state: k,
    initTouch,
    consumeFire()  { const v = firePressed;  firePressed = false;  return v; },
    consumeHyper() { const v = hyperPressed; hyperPressed = false; return v; },
  };
})();

/* ---------------------------------------------------------------------------
   5. ENTITIES
   ------------------------------------------------------------------------- */

/* Toroidaler Raum: Positionen wrappen am Rand. */
function wrap(o) {
  const W = GFX.W, H = GFX.H;
  if (o.x < -o.r)     o.x += W + o.r * 2;
  if (o.x > W + o.r)  o.x -= W + o.r * 2;
  if (o.y < -o.r)     o.y += H + o.r * 2;
  if (o.y > H + o.r)  o.y -= H + o.r * 2;
}

/* Zeichnet f(x,y) zusätzlich an gespiegelten Rand-Offsets, damit Objekte
   beim Wrap nahtlos auf beiden Seiten erscheinen. */
function drawWrapped(o, f) {
  const W = GFX.W, H = GFX.H;
  const ox = o.x < o.r ? W : o.x > W - o.r ? -W : 0;
  const oy = o.y < o.r ? H : o.y > H - o.r ? -H : 0;
  f(o.x, o.y);
  if (ox) f(o.x + ox, o.y);
  if (oy) f(o.x, o.y + oy);
  if (ox && oy) f(o.x + ox, o.y + oy);
}

class Particle {
  constructor(x, y, vx, vy, life, color, size) {
    this.x = x; this.y = y; this.vx = vx; this.vy = vy;
    this.life = life; this.max = life; this.color = color; this.size = size || 2;
  }
  update(dt) {
    this.x += this.vx * dt; this.y += this.vy * dt;
    this.vx *= 0.96; this.vy *= 0.96;
    this.life -= dt;
    return this.life > 0;
  }
  draw() {
    const a = clamp(this.life / this.max, 0, 1);
    GFX.spark(this.x, this.y, this.size * (0.4 + a * 0.6), this.color, a);
  }
}

class Star {
  constructor() { this.reset(true); }
  reset(any) {
    this.x = rand(0, GFX.W); this.y = rand(0, GFX.H);
    this.z = rand(0.2, 1); this.tw = rand(0, TAU);
  }
  draw(t) {
    const a = 0.18 + 0.22 * this.z + 0.1 * Math.sin(t * 2 + this.tw);
    GFX.spark(this.x, this.y, this.z * 1.3, '#9fd0ff', a * this.z);
  }
}

class Bullet {
  constructor(x, y, a, speed, owner) {
    this.x = x; this.y = y;
    this.vx = Math.cos(a) * speed; this.vy = Math.sin(a) * speed;
    this.r = 2.2; this.life = 1.05; this.owner = owner; // 'ship' | 'hunter'
    this.color = owner === 'ship' ? '#6ef0ff' : '#ff5577';
  }
  update(dt) {
    this.x += this.vx * dt; this.y += this.vy * dt;
    wrap(this); this.life -= dt;
    return this.life > 0;
  }
  draw() {
    drawWrapped(this, (x, y) => GFX.spark(x, y, this.r, this.color, clamp(this.life * 3, 0, 1)));
  }
}

class Ship {
  constructor() {
    this.x = GFX.W / 2; this.y = GFX.H / 2;
    this.vx = 0; this.vy = 0; this.a = -Math.PI / 2;
    this.r = 13; this.thrusting = false; this.cool = 0;
    this.invuln = 2.2; this.alive = true; this.blink = 0;
  }
  spawn() {
    this.x = GFX.W / 2; this.y = GFX.H / 2;
    this.vx = this.vy = 0; this.a = -Math.PI / 2;
    this.invuln = 2.2; this.alive = true;
  }
  update(dt, game) {
    const s = Input.state;
    const turn = 4.6;
    if (s.left)  this.a -= turn * dt;
    if (s.right) this.a += turn * dt;

    this.thrusting = s.thrust;
    if (s.thrust) {
      const ax = Math.cos(this.a) * 320, ay = Math.sin(this.a) * 320;
      this.vx += ax * dt; this.vy += ay * dt;
      // Triebwerks-Partikel
      if (Math.random() < 0.7) {
        const ba = this.a + Math.PI + rand(-0.3, 0.3);
        game.particles.push(new Particle(
          this.x + Math.cos(this.a + Math.PI) * this.r,
          this.y + Math.sin(this.a + Math.PI) * this.r,
          Math.cos(ba) * rand(60, 160) + this.vx * 0.3,
          Math.sin(ba) * rand(60, 160) + this.vy * 0.3,
          rand(0.2, 0.5), pick(['#ffd34a', '#ff8a3a', '#ff4fd8']), rand(1.4, 2.6)));
      }
    }
    // Reibung + Tempolimit
    this.vx *= 0.992; this.vy *= 0.992;
    const sp2 = hypot2(this.vx, this.vy), max = 460;
    if (sp2 > max * max) { const s2 = max / Math.sqrt(sp2); this.vx *= s2; this.vy *= s2; }

    this.x += this.vx * dt; this.y += this.vy * dt;
    wrap(this);

    this.cool -= dt;
    if (this.invuln > 0) this.invuln -= dt;
    this.blink += dt * 14;

    if (Input.consumeFire() && this.cool <= 0) this.shoot(game);
    if (Input.consumeHyper()) game.hyperspace();
  }
  shoot(game) {
    this.cool = 0.18;
    const mx = this.x + Math.cos(this.a) * this.r, my = this.y + Math.sin(this.a) * this.r;
    game.bullets.push(new Bullet(mx, my, this.a, 560 + Math.hypot(this.vx, this.vy) * 0.5, 'ship'));
    // Rückstoß
    this.vx -= Math.cos(this.a) * 18; this.vy -= Math.sin(this.a) * 18;
    SFX.shoot();
  }
  draw() {
    if (this.invuln > 0 && (Math.floor(this.blink) % 2 === 0)) return;
    const c = Math.cos(this.a), s = Math.sin(this.a);
    const nose = [c * 16, s * 16];
    const wl   = [Math.cos(this.a + 2.5) * 13, Math.sin(this.a + 2.5) * 13];
    const wr   = [Math.cos(this.a - 2.5) * 13, Math.sin(this.a - 2.5) * 13];
    const tail = [Math.cos(this.a + Math.PI) * 7, Math.sin(this.a + Math.PI) * 7];
    drawWrapped(this, (x, y) => {
      GFX.poly([
        x + nose[0], y + nose[1],
        x + wl[0],   y + wl[1],
        x + tail[0], y + tail[1],
        x + wr[0],   y + wr[1],
      ], '#6ef0ff', 2.2, true, 0.95);
      if (this.thrusting && Math.random() < 0.85) {
        const fl = 9 + Math.random() * 7;
        GFX.poly([
          x + Math.cos(this.a + 2.5) * 8,  y + Math.sin(this.a + 2.5) * 8,
          x + Math.cos(this.a + Math.PI) * (7 + fl), y + Math.sin(this.a + Math.PI) * (7 + fl),
          x + Math.cos(this.a - 2.5) * 8,  y + Math.sin(this.a - 2.5) * 8,
        ], '#ffd34a', 2, false, 0.9);
      }
    });
  }
}

class Rock {
  /* size 3 = groß, 2 = mittel, 1 = klein */
  constructor(x, y, size, vx, vy) {
    this.x = x; this.y = y; this.size = size;
    this.r = size === 3 ? 46 : size === 2 ? 26 : 14;
    const sp = (size === 3 ? rand(18, 42) : size === 2 ? rand(40, 75) : rand(70, 120));
    const a = rand(0, TAU);
    this.vx = vx ?? Math.cos(a) * sp;
    this.vy = vy ?? Math.sin(a) * sp;
    this.rot = rand(0, TAU); this.spin = rand(-1, 1) * (2.2 / size);
    this.color = pick(['#7bff9a', '#6ef0ff', '#9fd0ff']);
    // unregelmäßige Vektor-Silhouette
    const n = randi(8, 12); this.shape = [];
    for (let i = 0; i < n; i++) {
      const ang = (i / n) * TAU;
      const rr = this.r * rand(0.72, 1.12);
      this.shape.push(Math.cos(ang) * rr, Math.sin(ang) * rr);
    }
  }
  update(dt) {
    this.x += this.vx * dt; this.y += this.vy * dt;
    this.rot += this.spin * dt; wrap(this);
    return true;
  }
  draw() {
    const c = Math.cos(this.rot), s = Math.sin(this.rot);
    drawWrapped(this, (x, y) => {
      const p = [];
      for (let i = 0; i < this.shape.length; i += 2) {
        const px = this.shape[i], py = this.shape[i + 1];
        p.push(x + px * c - py * s, y + px * s + py * c);
      }
      GFX.poly(p, this.color, this.size === 3 ? 2.4 : 1.8, true, 0.7);
    });
  }
}

class Hunter {
  constructor(x, y, big) {
    this.x = x; this.y = y; this.big = big;
    this.r = big ? 20 : 13;
    this.vx = (x < GFX.W / 2 ? 1 : -1) * (big ? 70 : 110);
    this.vy = rand(-30, 30);
    this.cool = rand(0.6, 1.4); this.flip = rand(0.8, 1.8);
    this.color = '#ff4fd8';
  }
  update(dt, game) {
    this.x += this.vx * dt; this.y += this.vy * dt;
    // gelegentlicher vertikaler Richtungswechsel
    this.flip -= dt;
    if (this.flip <= 0) { this.vy = rand(-60, 60); this.flip = rand(0.8, 2); }
    // horizontal kein Wrap: verlässt es seitlich, ist es weg
    if (this.y < 0) this.y += GFX.H; if (this.y > GFX.H) this.y -= GFX.H;

    this.cool -= dt;
    if (this.cool <= 0 && game.ship.alive) {
      this.cool = this.big ? rand(1.1, 1.9) : rand(0.7, 1.3);
      let a = Math.atan2(game.ship.y - this.y, game.ship.x - this.x);
      if (this.big) a += rand(-0.35, 0.35);          // großer Jäger zielt grob
      else a += rand(-0.08, 0.08);                    // kleiner Jäger zielt scharf
      game.bullets.push(new Bullet(this.x, this.y, a, 300, 'hunter'));
      SFX.hunter();
    }
    return this.x > -40 && this.x < GFX.W + 40;
  }
  draw() {
    const r = this.r;
    drawWrapped(this, (x, y) => {
      GFX.poly([
        x - r, y, x - r * 0.4, y - r * 0.55, x + r * 0.4, y - r * 0.55,
        x + r, y, x + r * 0.4, y + r * 0.55, x - r * 0.4, y + r * 0.55,
      ], this.color, 2, true, 0.85);
      GFX.poly([x - r * 0.4, y - r * 0.55, x - r * 0.2, y - r,
                x + r * 0.2, y - r, x + r * 0.4, y - r * 0.55], this.color, 1.6, false, 0.8);
    });
  }
}

/* ---------------------------------------------------------------------------
   6. GAME  —  Zustandsautomat, Wellen, Kollisionen, Loop
   ------------------------------------------------------------------------- */
const Game = (() => {
  const el = {
    score: document.getElementById('score'),
    wave:  document.getElementById('wave'),
    best:  document.getElementById('best'),
    lives: document.getElementById('lives'),
    combo: document.getElementById('combo'),
    overlay: document.getElementById('overlay'),
    panel:   document.getElementById('panel'),
    touch:   document.getElementById('touch'),
  };

  const SCORE = { 3: 20, 2: 50, 1: 100, hunterBig: 200, hunterSmall: 1000 };
  const EXTRA_LIFE = 10000;

  const g = {
    state: 'menu',           // menu | playing | dead | gameover
    ship: null,
    bullets: [], rocks: [], hunters: [], particles: [], stars: [],
    score: 0, best: 0, lives: 3, wave: 0,
    combo: 0, comboTimer: 0,
    shake: 0, hunterTimer: 0, deadTimer: 0, nextExtra: EXTRA_LIFE,
    t: 0,
  };

  try { g.best = parseInt(localStorage.getItem('neondrift_best') || '0', 10) || 0; } catch (e) {}

  /* ---- Starfield ---- */
  function initStars() {
    g.stars.length = 0;
    const n = Math.round((GFX.W * GFX.H) / 9000);
    for (let i = 0; i < n; i++) g.stars.push(new Star());
  }

  /* ---- Explosion / Partikel ---- */
  function burst(x, y, n, color, speed, size) {
    for (let i = 0; i < n; i++) {
      const a = rand(0, TAU), sp = rand(speed * 0.3, speed);
      g.particles.push(new Particle(x, y, Math.cos(a) * sp, Math.sin(a) * sp,
        rand(0.3, 0.8), color, size || rand(1.5, 3)));
    }
  }

  /* ---- Wellen ---- */
  function spawnWave() {
    g.wave++;
    const n = Math.min(4 + g.wave, 11);
    for (let i = 0; i < n; i++) {
      // am Rand spawnen, vom Zentrum weg
      let x, y;
      if (Math.random() < 0.5) { x = Math.random() < 0.5 ? -40 : GFX.W + 40; y = rand(0, GFX.H); }
      else { x = rand(0, GFX.W); y = Math.random() < 0.5 ? -40 : GFX.H + 40; }
      g.rocks.push(new Rock(x, y, 3));
    }
    g.hunterTimer = rand(8, 14) - Math.min(g.wave * 0.4, 5);
    SFX.wave();
    flash(`WELLE ${g.wave}`, '#ff4fd8');
  }

  let flashMsg = null, flashT = 0;
  function flash(msg, color) { flashMsg = { msg, color }; flashT = 1.4; }

  /* ---- Kollisionen ---- */
  function hit(a, b) { return hypot2(a.x - b.x, a.y - b.y) < (a.r + b.r) * (a.r + b.r); }

  function splitRock(rock, idx) {
    burst(rock.x, rock.y, rock.size * 6, rock.color, 220, rock.size === 3 ? 3 : 2);
    g.shake = Math.min(g.shake + rock.size * 2.5, 16);
    if (rock.size === 3) SFX.bangBig(); else if (rock.size === 2) SFX.bangMid(); else SFX.bangSmall();
    addScore(SCORE[rock.size]);
    g.rocks.splice(idx, 1);
    if (rock.size > 1) {
      const kids = 2;
      for (let i = 0; i < kids; i++) {
        const a = rand(0, TAU), sp = rand(40, 90) + (3 - rock.size) * 30;
        g.rocks.push(new Rock(rock.x, rock.y, rock.size - 1,
          rock.vx * 0.4 + Math.cos(a) * sp, rock.vy * 0.4 + Math.sin(a) * sp));
      }
    }
  }

  function addScore(base) {
    g.combo++; g.comboTimer = 2.4;
    const mult = 1 + Math.floor(g.combo / 5) * 0.5;     // alle 5 Treffer +0.5×
    const gain = Math.round(base * mult);
    g.score += gain;
    if (g.score >= g.nextExtra) {
      g.lives++; g.nextExtra += EXTRA_LIFE; SFX.extra();
      flash('EXTRA-SCHIFF', '#7bff9a');
    }
    if (g.combo >= 5) {
      el.combo.textContent = `COMBO ×${mult.toFixed(1)}`;
      el.combo.style.opacity = '1';
    }
  }

  function killShip() {
    if (g.ship.invuln > 0 || !g.ship.alive) return;
    g.ship.alive = false;
    burst(g.ship.x, g.ship.y, 40, '#6ef0ff', 300, 3);
    burst(g.ship.x, g.ship.y, 20, '#ffd34a', 200, 2.5);
    g.shake = 22; SFX.hurt();
    g.lives--; g.combo = 0; el.combo.style.opacity = '0';
    g.deadTimer = 1.6;
    g.state = g.lives <= 0 ? 'gameover' : 'dead';
    if (g.state === 'gameover') {
      g.best = Math.max(g.best, g.score);
      try { localStorage.setItem('neondrift_best', String(g.best)); } catch (e) {}
      setTimeout(showGameOver, 1400);
    }
  }

  function hyperspace() {
    // Risiko-Sprung: zufällige Position, kurze Unverwundbarkeit
    burst(g.ship.x, g.ship.y, 16, '#ff4fd8', 200, 2);
    g.ship.x = rand(40, GFX.W - 40); g.ship.y = rand(40, GFX.H - 40);
    g.ship.vx = g.ship.vy = 0; g.ship.invuln = Math.max(g.ship.invuln, 0.8);
    SFX.bangSmall();
  }

  /* ---- Update ---- */
  function update(dt) {
    g.t += dt;
    if (g.shake > 0) g.shake = Math.max(0, g.shake - dt * 30);

    // Stars sind statisch, nur Twinkle in draw()

    if (g.state === 'playing' || g.state === 'dead') {
      if (g.ship && g.ship.alive) g.ship.update(dt, g);

      // Combo-Timer
      if (g.comboTimer > 0) { g.comboTimer -= dt; if (g.comboTimer <= 0) { g.combo = 0; el.combo.style.opacity = '0'; } }

      // Hunter-Spawn
      if (g.state === 'playing') {
        g.hunterTimer -= dt;
        if (g.hunterTimer <= 0 && g.hunters.length < 2) {
          const big = Math.random() < clamp(0.7 - g.wave * 0.05, 0.2, 0.7);
          const y = rand(GFX.H * 0.15, GFX.H * 0.85);
          g.hunters.push(new Hunter(Math.random() < 0.5 ? -30 : GFX.W + 30, y, big));
          g.hunterTimer = rand(12, 20);
        }
      }
    }

    // Entitäten updaten (rückwärts wegen splice)
    for (let i = g.bullets.length - 1; i >= 0; i--) if (!g.bullets[i].update(dt)) g.bullets.splice(i, 1);
    for (let i = g.rocks.length - 1; i >= 0; i--) g.rocks[i].update(dt);
    for (let i = g.hunters.length - 1; i >= 0; i--) if (!g.hunters[i].update(dt, g)) g.hunters.splice(i, 1);
    for (let i = g.particles.length - 1; i >= 0; i--) if (!g.particles[i].update(dt)) g.particles.splice(i, 1);

    if (g.state === 'playing' || g.state === 'dead') collisions();

    // Welle leer?
    if (g.state === 'playing' && g.rocks.length === 0 && g.hunters.length === 0) {
      spawnWave();
    }

    // Respawn nach Tod
    if (g.state === 'dead') {
      g.deadTimer -= dt;
      if (g.deadTimer <= 0 && safeToSpawn()) { g.ship.spawn(); g.state = 'playing'; }
    }

    if (flashT > 0) flashT -= dt;
  }

  function safeToSpawn() {
    const cx = GFX.W / 2, cy = GFX.H / 2, safe = 110;
    for (const r of g.rocks) if (hypot2(r.x - cx, r.y - cy) < (safe + r.r) ** 2) return false;
    for (const h of g.hunters) if (hypot2(h.x - cx, h.y - cy) < (safe + h.r) ** 2) return false;
    return true;
  }

  function collisions() {
    const ship = g.ship;
    // Schüsse
    for (let b = g.bullets.length - 1; b >= 0; b--) {
      const bul = g.bullets[b];
      if (bul.owner === 'ship') {
        let consumed = false;
        for (let r = g.rocks.length - 1; r >= 0; r--) {
          if (hit(bul, g.rocks[r])) { splitRock(g.rocks[r], r); g.bullets.splice(b, 1); consumed = true; break; }
        }
        if (consumed) continue;
        for (let h = g.hunters.length - 1; h >= 0; h--) {
          if (hit(bul, g.hunters[h])) {
            const hu = g.hunters[h];
            burst(hu.x, hu.y, 26, '#ff4fd8', 260, 3); SFX.bangMid();
            addScore(hu.big ? SCORE.hunterBig : SCORE.hunterSmall);
            g.hunters.splice(h, 1); g.bullets.splice(b, 1); g.shake = Math.min(g.shake + 8, 16);
            break;
          }
        }
      } else if (ship.alive && ship.invuln <= 0 && hit(bul, ship)) {
        g.bullets.splice(b, 1); killShip(); return;
      }
    }
    if (!ship.alive || ship.invuln > 0) return;
    // Schiff vs Rock
    for (let r = g.rocks.length - 1; r >= 0; r--) {
      if (hit(ship, g.rocks[r])) { splitRock(g.rocks[r], r); killShip(); return; }
    }
    // Schiff vs Hunter
    for (let h = g.hunters.length - 1; h >= 0; h--) {
      if (hit(ship, g.hunters[h])) {
        burst(g.hunters[h].x, g.hunters[h].y, 22, '#ff4fd8', 240, 3);
        g.hunters.splice(h, 1); killShip(); return;
      }
    }
  }

  /* ---- Render ---- */
  function render() {
    GFX.frame(g.state === 'menu' ? 0.4 : 0.28);
    const sx = g.shake ? rand(-g.shake, g.shake) : 0;
    const sy = g.shake ? rand(-g.shake, g.shake) : 0;
    GFX.gctx.save(); GFX.bctx.save();
    GFX.gctx.translate(sx, sy); GFX.bctx.translate(sx, sy);

    for (const s of g.stars) s.draw(g.t);
    for (const p of g.particles) p.draw();
    for (const r of g.rocks) r.draw();
    for (const h of g.hunters) h.draw();
    for (const b of g.bullets) b.draw();
    if (g.ship && g.ship.alive) g.ship.draw();

    if (flashT > 0 && flashMsg) {
      const a = clamp(flashT / 1.4, 0, 1);
      GFX.gctx.globalAlpha = a;
      GFX.text(flashMsg.msg, GFX.W / 2, GFX.H * 0.32, flashMsg.color, Math.min(GFX.W * 0.07, 44));
      GFX.gctx.globalAlpha = 1;
    }
    GFX.gctx.restore(); GFX.bctx.restore();
  }

  function syncHUD() {
    el.score.textContent = g.score.toLocaleString('de-DE');
    el.wave.textContent  = String(g.wave);
    el.best.textContent  = g.best.toLocaleString('de-DE');
    el.lives.textContent = g.lives > 0 ? Array(Math.min(g.lives, 8)).fill('▲').join(' ') + (g.lives > 8 ? '+' : '') : '—';
  }

  /* ---- Loop (fixe Zeitschritte) ---- */
  let last = performance.now(), acc = 0;
  const STEP = 1 / 120, MAXACC = 0.1;
  function loop(now) {
    let dt = (now - last) / 1000; last = now;
    if (dt > MAXACC) dt = MAXACC;
    acc += dt;
    while (acc >= STEP) { update(STEP); acc -= STEP; }
    render();
    if (g.state !== 'menu') syncHUD();
    requestAnimationFrame(loop);
  }

  /* ---- Overlays ---- */
  function isTouch() { return matchMedia('(pointer: coarse)').matches || 'ontouchstart' in window; }

  function showMenu() {
    g.state = 'menu';
    el.touch.classList.remove('on');
    el.overlay.classList.remove('hidden');
    el.panel.innerHTML = `
      <h1>NEON<span class="d"> DRIFT</span></h1>
      <p class="tag">VEKTOR · ARCADE · CRT</p>
      <div class="keys">
        ${isTouch()
          ? `<b>Pads</b> Drehen · Schub · Feuer<br>Tippe doppelt aufs Schiff für Hypersprung`
          : `<b>◀ ▶ / A D</b> Drehen &nbsp;·&nbsp; <b>▲ / W</b> Schub<br>
             <b>Leertaste</b> Feuern &nbsp;·&nbsp; <b>Shift / H</b> Hypersprung`}
      </div>
      <div class="btn" id="startBtn">START</div>
      <p class="sub" style="margin-top:1.4em">BEST &nbsp;<b style="color:var(--yel)">${g.best.toLocaleString('de-DE')}</b></p>
    `;
    document.getElementById('startBtn').addEventListener('click', start);
  }

  function showGameOver() {
    el.touch.classList.remove('on');
    el.overlay.classList.remove('hidden');
    const isBest = g.score >= g.best && g.score > 0;
    el.panel.innerHTML = `
      <h1 style="font-size:clamp(30px,10vw,68px)">GAME<span class="d"> OVER</span></h1>
      <p class="big">${g.score.toLocaleString('de-DE')}</p>
      <p class="sub">${isBest ? '★ NEUER BESTWERT ★' : 'BEST ' + g.best.toLocaleString('de-DE')}
         &nbsp;·&nbsp; WELLE ${g.wave}</p>
      <div class="btn" id="againBtn">NOCHMAL</div>
    `;
    document.getElementById('againBtn').addEventListener('click', start);
  }

  function reset() {
    g.bullets.length = g.rocks.length = g.hunters.length = g.particles.length = 0;
    g.score = 0; g.lives = 3; g.wave = 0; g.combo = 0; g.comboTimer = 0;
    g.shake = 0; g.nextExtra = EXTRA_LIFE; flashT = 0;
    g.ship = new Ship();
    initStars();
  }

  function start() {
    SFX.resume();
    el.overlay.classList.add('hidden');
    if (isTouch()) el.touch.classList.add('on');
    reset();
    g.state = 'playing';
    spawnWave();
  }

  function init() {
    g.hyperspace = hyperspace;   // Ship.update() ruft game.hyperspace()
    Input.initTouch();
    showMenu();
    requestAnimationFrame(now => { last = now; loop(now); });
  }

  // Pause bei Tab-Wechsel sauber halten (kein dt-Sprung)
  document.addEventListener('visibilitychange', () => { last = performance.now(); });

  return { init };
})();

Game.init();
</script>
</body>
</html>
